body:
  text: 高常侍集卷五唐高適撰詩登子賤琴堂賦詩三首并序甲申嵗適登子賤琴臺賦詩三首首章懷宓公之德千祀不朽次章美太守李公能嗣子賤之政再造琴臺末章多邑宰崔公能繼子賤之理其一宓子昔為政鳴琴登此臺琴和人亦間千載稱其才臨眺忽悽愴人琴安在哉悠悠此天壤唯有頌聲來其二邦伯感遺事慨然建琴堂乃知靜者心千載猶相望入室想其人出門何茫茫唯見白雲合東臨鄒魯鄉其三皤皤邑中老自誇邑中理何必升君堂然後知君美開門無犬吠早臥常晏起昔人不忍欺今我還復爾秦中送李九赴越攜手望千里于今將十年如何每離別心事復迍邅適越雖有以出關終耿然愁霖不可向長路或難前吳會獨行客山隂秋夜船謝家徴故事禹穴訪遺編鏡水君所憶蓴羮豫舊便歸來莫忘此兼示濟江篇古樂府飛龍曲留上陳左相即陳希烈兼李右相德以精靈降時膺夢寐求蒼生謝安石天子富人侯樽俎資高論巖廊挹大猷相門連户牖卿族嗣弓裘豁達雲開霽清明月映秋能為吉甫頌善用子房籌階砌思攀陟門闌尚阻修高山不易仰大匠本難投迹與松喬合心緣啓沃留公才山吏部書癖杜荆州幸沐千年聖何辭一尉休折腰知寵辱回首見沈浮天地莊生馬江湖范蠡舟逍遙堪自樂浩蕩信無憂去此從黃綬歸歟任白頭風塵與霄漢瞻望日悠悠留上李右相風俗登淳古君臣挹大庭深沈謀九德密勿契千齡獨立調元氣清心豁窅冥本枝連帝系長策冠生靈傅説明殷道蕭何律漢刑鈞衡持國柄柱石總賢一作朝經隱軫江山藻氛氲鼎鼐銘興中皆白雪身外即一作畫丹青江海呼窮鳥詩書問聚螢吹噓成羽翼提握動芳馨倚伏悲還笑棲遲一作升沉醉復醒恩榮初就列含育沗宵形有竊丘山惠無時枕席寧壯心瞻落景生事感流萍莫以才難用終期善易聼未為門下客徒謝少微星同崔貟外綦母拾遺九日宴京兆府李士曹今日好相見羣賢仍廢曹晚晴催翰墨秋興引風騷絳葉擁虛砌黃花隨濁醪閉門無不可何事更登高送蹇秀才赴臨洮悵望日千里如何今二毛猶思陽谷去莫厭隴山髙倚馬見雄筆隨身唯寶刀料君終自致勳業在臨洮同李九士曹觀壁畫雲作始知帝鄉客能畫蒼梧雲秋天萬里一片色只疑飛盡猶氛氲同薛司直秋霽曲江俯見南山作南山鬱初霽曲江湛不流若臨瑶池間一作前想望崑崙丘回首見黛色眇然波上秋深沉俯崢嶸清淺延阻修連潭萬木影插岸千巖幽杳藹信難測淵淪無暗投片雲對漁父獨鳥隨虛舟我心寄青霞世事慙白鷗得意在乘興忘懷非外求良辰自多暇欣與數子逰送崔功曹赴越傳有東南別題詩報客居江山知不厭州縣復何如莫恨吳歈曲當看越絶書今朝欲乘興隨爾食鱸魚夜別韋司士得成字髙館張燈酒復清夜鐘殘月鴈歸聲只言啼鳥堪求侣無那春風欲送行黃河曲裏沙為岸白馬津邊栁向城莫怨他鄉暫離別知君到處有逢迎送別昨夜離心正鬱陶三更白露西風髙螢飛木落何淅􅅹此時夢見西歸客曙鐘寥亮三四聲東鄰嘶馬使人驚攬衣出户一相送唯見歸雲縱復橫辟陽城荒城在髙岸凌眺俯清淇傳道漢天子而封審食其姦淫且不戮茅土孰云宜何得英雄主返令兒女欺母儀良已失臣節豈如斯太息一朝事乃令人所嗤淇上别業依依西山下别業桑林邊庭鴨喜多雨鄰雞知暮天野人種秋菜古老開原田且向世情逺吾今聊自然魯西至東平沙岸泊不定石橋水橫流問津見魯谷一作俗懷古傷家丘寥落千載後空傳褒聖侯淇上送韋司倉往滑臺飲酒莫辭醉醉多適不愁孰知非逺別終念對窮秋滑臺門外見淇水眼前流君去應回首風波滿渡頭别董大二首六翮飄颻私自憐一離亰洛十餘年丈夫貧賤應未足今日相逢無酒錢十里黃雲白日曛北風吹鴈雪紛紛莫愁前路無知已天下誰人不識君同陳留崔司户早春宴蓬池同官載酒出郊圻晴日東馳鴈北飛隔岸春雲邀翰墨傍簷垂栁報芳菲池邊轉覺虛無盡臺上偏宜酩酊歸州縣徒勞那可度後時連騎莫相違送桂陽孝亷桂陽年少西入秦數經甲科猶白身即今江海一歸客他日雲霄萬里人崔司録宅宴大理李卿多雨殊未已秋雲更沉沉洛陽故人初解印山東小吏來相尋上卿才大名不朽早朝至尊暮求友豁達常推海內賢殷勤但酌樽中酒飲醉欲言歸剡溪門前駟馬光照衣路傍觀者徒唧唧我公不以為是非淇上别劉少府子英近來住淇上蕭條維空林又非耕種時間散多自任伊君獨知我驅馬欲招尋千里忽擕手十年同苦心求仁見交態於道喜甘臨逸思乃天縱微才應陸沉飄然歸故鄉不復問離襟南登黎陽渡莽蒼寒雲隂桑葉原上起河凌山下深途窮更逺別相對益悲吟使青夷軍入居庸三首登頓驅征騎棲遲愧寶刀逺行今若此微祿果徒勞絶坂水連下羣峯雲共髙自堪成白首何事一青袍匹馬行將久征途去轉難不知邊地别秪訝客衣單溪冷泉聲苦山空木葉乾莫言關塞極雲雪尚漫漫古鎮青山口寒風落日時巖巒鳥不過氷雪馬堪遲出塞應無策還家賴有期東山足松桂歸去結茅茨自薊北歸驅馬薊門北北風邊馬哀蒼茫逺山口豁達胡天開五將已深入前軍止半回誰憐不得意長劍獨歸來送兵到薊北積雪與天逈屯軍連塞愁誰知此行邁不為覔封侯途中寄徐録事比以王書見贈落日風雨至秋天鴻鴈初離憂不堪比旅館復何如君又幾時去我知音信疏空多篋中贈長見右軍書高常侍集卷五
