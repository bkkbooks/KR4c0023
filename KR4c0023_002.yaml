  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0023_WYG_002-1a, image: WYG1071/WYG1071-0379c.png}
body:
  text: 髙常侍集卷二唐髙適撰詩陪竇侍御靈雲南亭宴詩并序得雷字涼州近胡髙下其池亭蓋以耀蕃落也幕府董帥雄勇徑踐戎庭自陽關而西猶枕席矣軍中無事君子飲食宴樂宜哉白簡在邊清秋多興况水具舟楫山兼亭臺始臨泛而寫煩俄登陟以寄傲絲桐徐奏林木更爽觴葡萄以遞歡指蘭茝而可掇胡天一望雲物蒼然雨蕭蕭而牧馬聲斷風嫋嫋而邊歌幾處又足悲矣貟外李公曰七日者何牛女之夕也夫賢者何得謹其時請賦南亭詩列之於後人幽宜眺聽目極喜亭臺風景知愁在關山憶夢回祗言殊語默何意忝逰陪連唱波瀾動冥搜物象開新秋歸逺樹殘雨擁輕雷簷外長天盡樽前獨鳥來常吟塞下曲多謝幕中才河漢徒相望嘉期安在哉陪竇侍御泛靈雲池得風字白露時先降清川思不窮江湖仍塞上舟楫在軍中舞換臨津樹歌饒向逈風夕陽連積水邊色滿秋空乘興宜投轄邀歡莫避驄誰憐持弱羽猶欲伴鴛鴻和竇侍御登涼州七級浮圖之作化塔屹中立孤髙宜上躋鐵冠雄賞眺金界寵招攜空色在軒户邊聲連鼓􅎏天寒萬里北地豁九州西清興揖才彥峻風和端倪始知陽春後具物皆筌蹄金城北樓北樓西望滿晴空積水連山勝畫中湍上急流聲若箭城頭殘月勢如弓垂竿已謝磻溪老體道猶思塞上翁為問邊庭更何事至今羌笛怨無窮武威同諸公過楊七山人得藤字幕府日多暇田家嵗復登相知恨不早乘興乃無恆窮巷在喬木深齋垂古藤邊城惟有醉此外更何能同吕判官從哥舒大夫破洪濟城回登積石軍多福七級浮圖塞口連濁河轅門對山寺寧知鞍馬上獨有登臨事七級凌太清千崖列蒼翠飄飄方寓目想像見深意髙興殊未平涼風颯然至拔城陳雲合轉斾胡星墜大將何英靈官軍動天地君一作常懷生羽翼本欲附騏驥𣢾假苦不前青冥信難致一歌陽春後三歎終自愧送白少府送兵之隴右殘更登隴首逺別指臨洮為問關山事何如州縣勞軍容隨赤羽樹色引青袍誰斷單于臂今年太白髙登隴隴頭逺行客隴上分流水流水無盡期行人一作客未云已淺才登一命孤劍通萬里豈不思故鄉從來感知已入昌松東界山行鳥道幾登頓馬蹄無暫一作復間﨑嶇出長坂合沓猶前山石激水流處天寒松色間王程應未盡且莫顧刀鐶河西送李十七邊城多逺別此去莫徒然問禮知才子登科及少年出門看落日驅馬向秋天髙價人爭重行當早著鞭詠史一絶尚有綈袍贈應憐范叔寒不知天下士猶作布衣看田家春望出門何所見春色滿平蕪可歎無知已高陽一酒徒宴韋司户山亭院人幽想靈山意愜憐逺水習靜務為適所居還復爾汲流漲華池開酌宴君子苔徑試窺踐石屏可攀倚入門見中峯攜手如萬里橫琴了無事垂釣應有以髙館何沈沈颯然涼風起同熊少府題盧主簿茆齋盧兼有人倫虛院野情在茆齋秋興存孝廉趨下位才子出髙門乃繼幽人靜能令學者尊江山歸謝客神鬼下劉根階樹時攀折窗書任討論自堪成獨往何必武陵源贈別王十七管記故交吾未測薄宦空年嵗晚節蹤曩賢雄詞冠當世堂中皆食客門外多酒債産業曾未言衣裘與人敝飄颻戎幕下出入關山際轉戰輕壯心立談有邊計雲沙自回合天海空迢遞星髙漢將驕月盛胡兵鋭沙深冷陘斷雪暗遼陽閉亦謂掃攙搶旋驚陷蜂蠆歸旌告東捷鬬騎傳西敗遙飛絶漠書已築長安第畫龍俱在葉寵鶴先居衛勿辭部曲勳不藉將軍勢相逢季冬月悵望窮海裔折劔留贈人嚴裝遂云邁我行即悠緬及此還羇滯曾非濟代謀且有臨深誡隨波混清濁與物同醜麗眇憶青一作清巖棲寧忘褐衣拜自言偕一作愛水石本欲親蘭蕙何意薄松筠翻然重菅蒯恆深取與分孰慢平生契𣢾曲雞黍期酸辛別離袂逢時愧名節遇坎悲淪替適趙非解紛遊燕獨無説浩歌方振蕩逸翮思凌勵倐若異鵬摶吾當學蟬蛻效古贈崔二十月河洲時一看有歸思風飈生慘烈雨雪暗天地我輩今胡為浩哉迷所至緬懷當途者濟濟居聲位邈然在雲霄寧肯更淪躓周旋多燕樂門館列車騎美人芙蓉姿狹室蘭麝氣金爐陳獸炭談笑正得意豈論草澤中有此枯稿士我慙經濟策久欲甘棄置君負縱橫才如何尚憔悴長歌增鬱怏對酒不能醉窮達自有時夫子莫下淚巨鹿贈李少府李侯雖薄宦時譽何藉藉駿馬常借人黃金每留客投壺華館靜縱酒涼風夕即此遇神仙吾欣知損益醉後贈張九旭世上謾相識此翁殊不然興來書自聖醉後語尤顛白髮老間事青雲在目前床頭一壺酒能更幾回眠酬司空璲飄颻未得意感激與誰論昨日遇夫子乃欣吾道存江山滿詞賦札翰起涼溫吾見風雅作人知德業尊驚飈蕩萬木秋氣屯髙原燕趙何蒼茫鴻雁來翩翻此時與君別握手欲無言漁父歌曲岸深潭一山叟駐眼看鈎不移手世人欲得知姓名良久問他不開口笋皮笠子荷葉衣心無所營守釣磯料得孤舟無定止日暮持竿何處歸魯秋胡妾本邯鄲未嫁時容華倚翠人未知一朝結髮從君子將妾迢迢東魯陲時逢大道無艱阻君方遊宦從陳汝蕙樓獨卧頻度春彩閣辭君幾徂暑三月垂楊蠶未眠攜籠結侣南陌邉道逢行子不相識贈妾黃金買少年妾家夫壻經離久寸心誓與長相守碩言行路莫多情道妾貞心在人口日暮蠶飢相命歸攜籠端飾來庭闈勞心苦力終無恨所貴一作冀君恩那可依聞説行人已歸止乃是向來贈金子相看顔色不復言相顧懷慙有何已從來自隱無疑背直為君情也相會如何咫尺仍有情况復迢迢千里外誓將顧恩不顧身念君此日赴河津莫道向來不得意故欲留規誡後人酬李少府出塞魂猶一作屢驚懷質意難説誰知吾道間乃在客中別日夕捧瓊瑤相思無休歇伊人雖薄宦舉代推髙節述作凌江山聲華滿氷雪一登薊丘上四顧何慘烈來鴈無盡時邉風正騷屑將從崖谷遁且與浮沈絶君若登青雲余當投魏闕酬裴秀才男兒貴得意何必相知早飄蕩與物永蹉跎覺年老長卿無産業季子慙妻嫂此事難重陳未為衆人道酬陸少府朝臨淇水岸還望衛人邑別意在山阿征途背原隰稍稍前村口唯見轉蓬入水渚人去遲霜天鴈飛急固應不逺別所與路未及欲濟川上舟相思空佇立酬衛八雪中見贈季冬憶淇上落日歸山樊舊宅帶流水平田臨古村雪中望來信醉裏開衡門果得希代寶緘之那可論寄孟五秋氣落窮巷離憂兼暮蟬後時已如此髙興亦徒然知君念淹泊憶我屢周旋征路見來鴈歸人悲逺天平生感千里相望在貞堅同朱五題盧使君義井高義唯良牧深仁自下車寧知鑿井處還是飲冰餘地即泉源久人當汲引初體清能鑒物色洞每含虛上善滋來往中和浹里閭濟時應未竭懷惠復何如同衛八題陸少府書齋知君薄州縣好靜無冬春散帙至棲鳥眀燈留故人深房臘酒熟高院梅花新若是周旋地當令風義親同郭十題楊主簿新廳華館曙沈沈惟良正在今用材兼柱石開物象高深更得芝蘭地兼榮枳棘林向風扄戟户當署近棠隂勿改安卑節聊間理劇心多君有知已一和郢中吟送張瑶貶五溪尉他日惟楨幹明時懸鏌鎁江山遙去國妻子獨還家離別無嫌逺沈浮勿強嗟南登有詞賦知爾弔長沙送魏八更沽淇上酒還泛驛前舟為惜故人去復憐嘶馬愁雲山行處合風雨興中秋此路無知已明珠莫暗投別韋五徒然酌杯酒不覺散人愁相識仍逺別欲歸翻旅遊夏雲滿郊甸明月照河洲莫恨征途逺東看漳水流別劉大校書昔日亰華去知君才望新應猶作賦好莫歎在官貧且復傷逺别不然愁此身青楓幾萬里江上一歸人宋中別司功叔各賦一物得商商丘試一望隱隱帶秋天地與星辰在城將大路遷干戈悲昔事墟落對窮年即此傷離緒凄凄酒賦筵送蔡十二之海上時在衛中黯然何所為相對益悲酸季弟念離別賢兄救急難河流冰處盡海路雪中寒尚有南飛鴈知君不忍看宴郭校書因之有別綵服趨庭訓分交載酒過藝香名早著蓬轉事仍多戰苦知機息窮愁奈別何雲霄莫相待年鬢已蹉跎别韋兵曹離别長千里相逢數十年此心應不變他事已徒然惆悵春光裏蹉跎栁色前逢時當自取看爾欲先鞭獨孤判官部送兵餞君嗟逺别為客念周旋征路今如此前軍猶眇然出關逢漢壁登隴望胡天亦是封侯地願君早著鞭送李少府時在客舍相逢旅館意多違暮雪初晴候鴈飛主人酒盡君未醉薄暮塗遙歸不歸高常侍集卷二
