body:
  text: 髙常侍集卷六唐髙適撰詩信安王幕府詩并序開元二十年國家有事林胡詔禮部尚書信安王總戎大舉時考功郎中王公司勲郎中劉公主客郎中魏公侍御史李公監察御史崔公咸在幕府詩以頌美數公見於詞凡三十韻雲紀軒皇代星髙太白年廟堂咨上䇿幕府制中權盤石藩維固昇壇禮樂先國章榮印綬公服貴貂蟬樂善旌深徳輸忠格上𤣥剪桐光寵錫題劍美貞堅聖祚雄圖廣師貞武徳䖍雷霆七校發旌斾五營連華省徴羣又霜臺舉二賢豈伊公望逺曾是茂才遷並秉韜鈐術兼該翰墨筵帝思麟閣像臣獻栢梁篇振玉登遼甸摐金歴薊壖度河飛羽檄横海泛樓船北伐聲逾邁東征務以專講戎喧涿野料敵靜居延軍勢持三畧兵戎自九天朝瞻授鉞去時聽偃戈旋大漠風沙裏長城雨雪邊雲端臨碣石波際隠朝鮮夜壁冲髙斗寒空駐綵旃倚弓𤣥兎月飲馬白狼川庶物隨交泰蒼生解倒懸四郊增氣象萬里絶風煙闗寒鴻勲著京華甲第全落梅横吹後春色凱歌前直道常兼濟微才獨棄捐曵裾誠已矣投筆尚悽然作賦同元淑能詩匪仲宣雲霄不可望空欲仰神仙奉詶睢陽李太守公族稱王佐朝經允帝求本枝彊我李磐石冠諸劉禮樂光輝盛山河氣象幽系髙周柱史名重晉陽秋華省膺推擇青雲寵宴遊握蘭多具美前席有嘉謀賦得黄金賜言皆白璧酬著鞭驅駟馬操刃解全牛出鎮兼方伯承家復列侯朝瞻孔北海時用杜荆州廣固纔登陟毗陵忽阻脩三台冀入夢四岳尚分憂郡邑連京口山川望石頭海門當建節江路引鳴騶俗見中興理人逢至道休先移白額撗更息赭衣偷梁國歌来晚徐方怨不留豈伊齊政術將以變澆浮訟簡知能吏刑寛察要囚坐堂風偃草行縣雨隨輈地是蒙荘宅城遺閼伯丘孝王餘井逕㣲子故田疇冬至招搖轉天寒螮蝀收猿巖飛雨雪兎苑落梧楸列㦸霜侵户褰幃月在鉤好賢常解榻乘興每登樓逸足横千里髙談注九流詩題青玉案衣贈黒貂裘窮巷軒車靜閑齋耳目愁未能方管樂翻欲慕巢由講徳良難敵觀風豈易儔寸心仍有適江海一扁舟廣陵别鄭處士落日知分手春風莫斷腸興来無不惬才在亦何傷溪水堪垂釣江田耐挿秧人生只為此亦足傲羲皇别孫訢時俱客宋中離人去復留白馬黒貂裘屈指論前事停鞭惜舊遊帝鄉那可忘旅館日堪愁誰念無知已年年睢水流别耿都尉四十能學劍時人無此心如何耿夫子感激投知音翩翩白馬来二月青草深别易小千里興酣傾百金宋中遇林慮楊十七山人因而有别昔余涉漳水驅車行鄴西遥見林慮山蒼蒼戛天倪邂逅逢爾曹說君彼巖棲蘿徑垂野蔓石房倚雲梯秋韭何青青藥苖數百畦粟林隘谷口栝樹森迴溪耕耘有山田紡績有山妻人生茍一作但如此何必一作寜事組與珪誰謂逺相訪曩情殊不迷簷前舉醇醪竈下烹隻雞朔風忽振蕩昨夜寒螀啼遊子益思歸罷琴傷解攜出門盡原野白日黯已低始驚道路難終念言笑暌因聲謝岑壑嵗暮一攀躋苦雨寄房四兄昆季獨坐見多雨況兹兼索居茫茫十月交窮隂千里餘彌望無端倪北風擊林箊白日渺難覩黄雲争巻舒焉得造化功曠然一掃除滴瀝簷宇愁寂寥談笑疎泥塗擁城郭水潦盤丘墟惆悵憫田農徘徊傷里閭曾是力井稅曷為無斗儲萬事切中懐十年思上書君門嗟緬邈身計念居諸沉吟顧草茅鬱怏任盈虛黄鵠不可羡鳴雞時起予故人平臺側高館臨通衢兄弟方荀陳才華冠應徐弹棊自多暇飲酒更何如知人想林宗直道慙史魚攜手流風在開襟鄙吝袪寜能訪窮巷相與對園蔬送劉評事充朔方判官賦得征馬嘶征馬向邊州蕭蕭嘶一作聴不休思深應帶别聲斷為兼秋歧路風将逺闗山月共愁贈君從此去何日大刀頭别張少府歸客留不住朝雲縱復横馬頭向春草斗柄臨髙城嗟我乆離别羡君看弟兄歸心更難道迴首一傷情封丘作州縣才難適雲山道欲窮揣摩慙黠吏棲隠謝愚公詶馬八效古見贈深崖生緑竹秀色徒氛氲時代種桃李無人顧此君柰何氷雪操尚與蒿萊羣願託靈仙子一吹聲入雲送崔録事赴宣城大國非不理小官皆用才欲行宣城印住飲洛陽盃晚景為人别長天無鳥迴舉㠶風波渺倚棹江山来羨爾兼乘興蕪湖千里開畫馬篇同諸公宴睢陽李太守各賦一物君侯櫪上􅔕皃在丹青中馬毛連錢蹄鐡色圖畫光輝驕玉勒馬行不動勢若来權竒蹴踏無塵埃感兹絶代稱妙手遂令談者不容口騏驎獨歩自可珍駑駘音苔萬疋知何有終未如他櫪上騘載華轂騁飛鴻荷君翦拂與君用一日千里如旋風營州歌營州少年厭原野皮裘䝉茸獵城下虜酒千杯不醉人健兒十嵗能騎馬贈别禇山人攜手贈将行山人道姓名光隂薊子訓才術禇先生牆上梨花白罇中桂酒清洛陽無二價猶是慕風聲詠馬鞭龍竹養根凡㡬年工人截之為長鞭一節一目皆天然珠重重星連連繞指柔純金堅䋲不直規不圓把向空中捎一聲良馬有心日馳千宋中别李八嵗晏誰不歸君歸意可說將趨倚門望還念同人别駐馬臨長亭飄然事明發蒼茫眺千里正值苦寒節舊國多轉蓬平臺下明月世情薄疵賤夫子懐賢哲行矣各勉旃吾當挹餘烈宋中别周梁李三子曾是不得意適来兼别離如何一樽酒飜作滿堂悲周子負髙價梁生多逸詞周旋梁宋間感激建安時白雪正如此青雲無自疑李侯懐英雄骯髒乃天資方寸且無間衣冠當在斯俱為千里遊勿念兩鄉辭且見壮心在莫嗟攜手遲涼風吹北原落日滿西陂露下草初白天長雲屢滋我心不可得君兮定何之京洛多知已誰能憶左思詶别薛三蔡大留簡韓十四主簿迢逓辭京華辛勤異鄉縣登髙俯滄海迴首淚如霰同人乆離别失路還相見薛侯懐直道徳業應時選蔡子負清才當年擢賔薦韓公有竒節詞賦凌羣彦讀書嵩岑間作吏滄海甸伊余寡棲託感激多愠見縱誕非爾情漂淪任疵賤忽枉瓊瑶作乃深平生眷始謂吾道存終嗟客㳺倦歸心無晝夜别事除言宴復值凉風時蒼茫夏雲變送董判官逢君說行邁倚劍别交親幕府為才子将軍作主人近闗多雨雪出塞有風塵長策當須用男兒莫顧身薊門不遇王之渙郭宻之因以留贈適逺登薊丘兹晨獨騷屑賢交忽不見吾碩終難說迢逓千里㳺羈離十年别才華仰清興功業嗟芳節曠蕩阻雲海蕭條帶風雪逢時事多謬失路心彌折行矣勿重陳懐君但愁絶别王八征馬嘶長路離人挹佩刀客来東道逺歸去北風髙時候何蕭索鄉心更鬱陶傳君遇知巳行日有綈袍送虞城劉明府謁魏郡苖太守天官蒼生望出入承明廬肅肅領舊藩皇皇降璽書茂宰多感激良時復吹噓永懐一言合誰謂千里疎對酒忽命駕兹情何起予炎天晝如火極目無行車長路出雷澤浮雲歸孟諸魏郡十萬家歌鐘喧里閭傳道賢君至閉闗常晏如君將挹髙論定是問樵漁今日逢明聖吾為陶隠居奉詶路太守見贈之作盛才膺命代髙價動良時帝簡登藩翰人和發詠思神仙去華省鴛鷺憶丹墀清浄能無事優㳺即賦詩江山紛想像雲物共萎蕤逸氣劉公幹𤣥言向子期多慙汲引速翻愧激昻遲相馬知何限登龍反自疑風塵吏道迫行邁旅心悲拙疾徒為爾窮愁欲問誰秋庭一片葉朝鏡數莖絲州縣甘無取丘園悔莫追瓊瑶生箧笥光景借茅茨他日青霄裏猶應訪所之餞宋八充彭中丞判官之嶺外覩君濟時略使我氣填膺長策竟不用髙才徒見稱一朝知已達累日詔書徴羽翮忽然就風飈誰敢凌舉鞭趨嶺嶠屈指冐炎蒸北㕐送馳馹南人思飲氷彼邦本倔強習俗多驕矜翠羽干平法黄金撓直䋲若将除害馬慎勿信蒼蠅魑魅寜無患忠貞適有慿猿啼山不斷鳶跕路難登海岸出交趾江城連始興繡衣當節制幕府盛威稜勿憚九疑險須令百越澄立談多感激行李即嚴凝離别胡為者雲霄遲爾昇送柴司户充劉卿判官之嶺外嶺外資雄鎮朝端寵節旄月卿臨幕府星使出詞曹海對羊城闊山連象郡髙風霜驅瘴癘忠信涉波濤别恨隨流水交情脫寳刀有才無不適行矣莫徒勞贈别晉三處士有人家住清河源渡河問我逰梁園手持道經注已畢心知内篇口不言盧門十年見秋草此心惆悵誰能道知已從来不易知慕君為人與君好别時九月桑葉疎出門千里無行車愛君且欲君先達今上求賢早上書九月九日詶顔少府簷前白日應可惜籬下黄花為誰有行子迎霜未授衣主人得錢始沽酒蘇秦顦顇人一作時多厭蔡澤棲遲一作遑世看醜縱使登髙只斷腸不如獨坐空搔首賦得還山吟送沈四山人還山吟天髙日暮寒山深送君還山識君心人生老大須恣意看君解作一生事山間偃仰無不至石泉淙淙若風雨桂花松子常滿地賣藥囊中應有錢還山服藥又長年白雲勸盡杯中物明月相隨何處眠眠時憶問醒時事夢魂可以相周旋見人臂蒼鷹寒楚十二月蒼鷹八九毛寄言燕雀莫相忌一作啅自有雲霄萬里髙高常侍集巻六
