body:
  text: 髙常侍集卷十唐髙適撰表為東平薛太守進王氏瑞詩表臣某言符瑞之興實由王化詩歌之作本自國風伏見范陽盧某母琅琊王氏性合希夷體於靜默精微道本馳騖元關旁通天地之心預紀休徴之盛去景龍二載撰天寶回文詩凡八百一十二字循環有數一作理若寒暑之遞遷應變無窮謂隂陽之莫測誡其子曰吾殁之後爾密記之當逢大道之朝必遇非常之主則真圖之製便可上言君親之義不違犬馬之誠斯在臣早識其子常與臣言星霜屢移書奏仍闕蓋以嵗月滋久㫖趣幽微沉吟取耳目之前倐忽應禎祥之後伏惟皇帝陛下乘道御極乃聖興化參日月之並明一乾坤而同德梯航萬里爭飲淳和之風臣妾四夷盡歸仁夀之域今陛下務於道道可盡乎法於天天實長久是知與道齊運比天同休無疆之徴乃在兹矣則王氏之美其可替乎章句粲然所謂沒而不朽者也臣某誠惶誠恐頓首頓首昔漢幸甘泉且昧神君之語周窮轍迹徒稱王母之謡豈若逈出名言髙懸響像讃皇王之丕命運宫商於景福且夫靈芝嘉禾草木之瑞者黃龍丹雀禽獸之瑞者猶能光揚帝載標榜頌聲方之真圖彼未為得特望編之史策列在樂章則陛下先於天而聽於人也臣才術淺劣謬忝藩條曾微㳙塵以答萬一恆馳北極每切子牟之戀遙奉南山願效封人之祝謝封丘縣尉表臣適言臣田野賤品生逢聖時得與昆蟲俱霑雨露常謂老死林藪不識闕庭豈其巖穴久空弓旌未已賢才畢用搜訪仍勤見堯舜之為心荷乾坤之善貸臣藝業無取謬當推薦自天有命追赴上京曾未浹旬又拜臣職顧慙虛受實懼曠官捧日無階戴天何報臣已於正衙辭訖即以今日赴官無任犬馬之志謹奉表陳謝以聞臣適誠惶誠恐頓首頓首謝上彭州刺史表臣某言伏奉聖恩授臣彭州刺史寵光自天喜懼交集臣某誠惶誠恐頓首頓首死罪死罪臣本野人匪求名逹始自一尉曾未十年北使河湟南出江漢奉上皇非常之遇䝉陛下特逹之恩纍登諌司頻歷憲府比逆亂侵軼淮楚震驚遂兼節制之權空忝腹心之寄銜命感激思效駑駘敢竭公忠動無回避而智不周物才難適時俄塵聖聰果速官謗實謂死亡可待流竄在兹陛下𢎞覆載之恩明日月之鑒始拜宫允今列藩條雨露之恩更霑枯朽陽和之氣忽曜沉埋天髙聽卑臣獨何幸臣某誠惶誠恐頓首頓首死罪死罪臣聞忠臣事君雖死無二臣今未死敢忘至公伏惟陛下哀臣愚䝉矜臣方直臣雖在逺若近天顔臣以今月七日到所部上訖宣布德音草木增氣敷陳睿澤黎庶昭蘇無任悃𣢾屏營之至謹附驛奉表陳謝以聞臣某誠惶誠恐死罪死罪謹言謝上劔南節度使表臣某言受脤登壇必先禮樂剖符攬轡是委腹心方將總領諸侯整訓戎旅分二南之名器創七德之籌謀君無虛授臣無虛受授受之際任用匪輕况全蜀奧區非賢勿守方面重寄擇善而從顧臣庸愚豈合祗拜逺奉恩制不敢逡巡即以二月二日上訖天威在顔風俗思變飲氷食蘗策朽磨鉛臣往在淮陽已無展效出臨彭蜀又乏循良雖聖恩不移而微臣益懼謹當宣揚皇化鎮撫蕃蠻訓率吏兵剪除夷獠庶冀毫髮增益山丘陛下慎擇任人朝廷多士伏願更徴英彥俾付西南許臣暮年歸侍丹闕臣子之懇君父之慈天髙聽卑下情上達軍府多事稅賦方殷臣今逐便指撝乘間式遏救蒼生之疲弊寬陛下之憂勤乃臣丹誠慺慺於夙夜無任悾𣢾之至謹遣洋州司馬攝參謀臣路球謹奉表陳謝以聞云云賀安祿山死表臣某言臣得河南道及諸州牒皆言逆賊安祿山苦痛而死手足俱落眼鼻殘壞臣聞負天者天誅負神者神怒其道甚著今乃克彰臣某誠歡誠喜頓首頓首逆賊孤負聖朝造作氛祲嘯聚吠堯之犬倚賴射天之矢殘酷生靈斯亦至矣臣恨不得血賊於萬㦸肉賊於三軍空隨率土之歡逺奉九霄之慶即當總統將士慿恃威靈驅未盡之犬羊覆已亡之巢穴無任踴躍慶快之至謹遣攝判官李翥奉表陳賀以聞謝上淮南節度使表臣某言以今月二日至廣陵以某日上訖流布聖澤江淮益深扇揚皇風草木增色臣誠惶誠恐頓首頓首伏惟皇帝陛下大明照臨純孝撫御漢主事親之日爰總六師軒后垂衣之辰再清四海猶以京華尚阻國步暫艱運黃石之神謀推赤心於人腹臣器非管樂殊孔明之自比識謝孫吳異山濤之暗合豈意聖私超等榮寵荐臻拔自周行寄重方面以時危而注意竊愧非才因國難以捐軀顧為定分即當訓練將卒緝綏黎氓外以平賊為心內以安人為務庶使殄滅凶醜舞詠時雍報明主知臣之恩成微臣許國之節不任戴荷攀戀之至謹遣某官陳謝以聞云云賀收城表臣某言閏正月十六日中使郭羅至伏奉勑書示臣聖略收復瀍洛掃殄凶徒臣某手之足之載欣載躍臣聞天不假易將而必誅守在四夷難逃一面頃者逆賊稔惡竊據中都欲驅犬羊敢肆蜂蠆碎首於雷霆之下竄跡於城社之中猶貯殘魂擬收餘燼陛下澤深覆載功濟艱難神武必止於干戈寰區大拯於塗炭好生惡殺誠屢發於宸心走獸奔禽盡已罹於網目使風雲一變日月增輝巨海絶其揚波祅氛化為和氣臣忝司戎律纍奉德音昭宣睿謀底寧縣道天下幸甚豈獨方隅無任慶快之至謹遣洋州司馬貟外同正貟攝參謀臣路球奉表陳賀以聞臣某言賀斬逆賊徐知道表臣某言臣聞人臣無將將必誅之逆賊前成都少尹兼侍御史僞稱成都尹兼侍御史中丞劒南節度使徐知道中官攜養莫知姓族熒惑主司叨竊憲臺不能輸瀝肝膽以答休明而懷挾奸邪嘯聚同惡傾竭府庫塗炭黎氓遂為欃槍恣行蠆毒杜塞劔道擁遏朝經部署凶殘統領州縣曾未數日蕩壞一隅郊原已空市井如掃臣與卭南鄰境左右叶心積聚軍糧應接師旅以今月二十三日大破賊衆同惡翻然共殺知道三軍慶快雲物改容百姓欣歡景色相賀此皆社稷昭應神靈保持伏惟皇帝陛下一德動天無逺不届兵戈向戢華夏克寧布蕭王之赤心竭盆子之丹𣢾妖氛聚而皆盡郡國危而更安髙視百王能事斯畢臣忝守藩翰罹此艱虞覩天地之廓清與飛動之咸若無任踴躍之至謹奉表陳賀以聞請入奏表右自徐知道作亂軍府略空救弊扶傷事資安輯臣夙夜陳力啓處不遑伏以二陵攀號臣未修壤奠萬方有主臣未覩天顔犬馬之誠不勝懇欵候士卒稍練蕃夷漸寧特望聖恩許臣入奏謹録奏聞伏聽勑㫖謹奏高常侍集卷十
