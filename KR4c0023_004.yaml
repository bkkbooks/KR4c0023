body:
  text: 髙常侍集卷四唐髙適撰詩三君詠并序開元中適遊於魏郡北有故太師鄭公舊館里中有故尚書郭公遺業邑外有故太守狄公生祠焉覩物增懷遂為三君詠魏鄭公鄭公經綸日隋氏風塵昏濟代取高位逢時敢直言道光先帝業義激舊君恩寂寞卧龍處英靈千載魂郭代公元振代公實英邁津涯浩難識擁兵抗矯徴仗節歸有德縱橫負才智顧眄安社稷流落勿重陳懷哉為悽惻狄梁公仁傑梁公乃貞固勳烈垂竹帛昌言太后朝潛運儲君策待賢開相府共理登方伯至今青雲人猶是門下客别從甥萬盈諸生曰萬盈四十乃知名宅相豫偏重家丘人莫輕美才應自料苦節豈無成莫以山田薄今春又不耕别崔少府知君少得意汶上掩柴扉寒食仍留火春風未授衣皆言黃綬屈早向青雲飛借問一作共約他鄉事今年歸不歸別馮判官碣石遼西地漁陽薊北天關山唯一道雨雪盡三邊才子方為客將軍正渴賢遙知幕府下書記日翩翩東平路作三首南圖適不就東走豈吾心索索涼風動行行秋水深蟬鳴木葉落兹夕更秋霖明時好畫策動欲干王公今日無成事依依親老農扁舟向何處吾愛汶陽中清曠涼夜月徘徊孤客舟渺然風波上獨夢前山秋秋至復搖落空令行者愁同諸公登慈恩寺浮圖香界泯羣有浮圖豈諸相登臨駭一作信孤髙披拂欣大壯言是羽翼生迥出虛空上頓疑身世别乃覺形神王宫闕皆户前山河盡簷向秋風昨夜至秦塞多清曠千里何蒼蒼五陵鬱相望盛時慙阮步末宦知周防輸效獨無因斯焉可遊放間居栁色驚心事春風厭索居方知一杯酒猶勝百家書和賀蘭判官望海作聖代務平典輶軒推上才迢亭溟海際曠望滄波開四牡未遑息三山安在哉巨鼇不可釣髙浪何崔嵬湛湛朝百谷茫茫連九垓挹流納廣大觀異增遲回日出見魚目月圓知蚌胎迹非想像到心以精靈猜逺色帶孤嶼虛聲涵殷雷風行越裳貢水遏吳天災攬轡隼將擊忘機鷗復來緣情韻騷雅獨立遺塵埃吏道竟殊用翰林仍沗陪長鳴謝知已所愧非龍媒塞上聼吹笛雪淨胡天牧馬還月明羌笛戍樓間一本云胡人羌笛戍樓間樓上蕭條明月間借問梅花何處落風吹一夜滿關山奉酬北海李太守丈人夏日平隂亭天子股肱守丈人山嶽靈出身侍丹墀舉翮凌青冥當昔皇運否人神俱未寧諌官莫敢議酷吏方專刑谷永獨言事匡衡多引經兩朝納深𠂻萬乘無不聽盛烈播南史雄詞豁東溟誰謂整隼旟翻然憶柴扄寄書汾陽客回首平隂亭開封見千里結念存百齡隱軫江山麗氛氲蘭茝馨自憐遇時休漂泊隨流萍春野變木德夏天臨火星一生徒羡魚四十猶聚螢從此日間放焉能懷拾青塞上東出盧龍間浩然客思孤亭候列萬里漢兵猶備胡邊塵漲北溟塞馬正南驅轉鬬豈長策和親非逺圖惟昔李將軍按節臨此都總戎掃大漠一戰擒單于常懷感激心願效縱橫謨倚劍欲誰語關河空鬱紆贈別沈四逸人沈侯未可測其况信浮沉十載常獨坐幾人知此心乘舟蹈滄海買劔投黃金世務不足煩有田西山岑我來遇知已遂得開清一作神襟何意閻閭間閻閭一作閫閾沛然江海深疾風掃秋樹濮上多鳴砧耿耿樽酒前聮鴈飛愁音平生重離别感激對孤琴遇盧明府有贈良吏不易得古人今可傳靜然本諸已以此知其賢我行挹髙風羡爾兼少年胸懷豁清夜史漢如流泉明日復行春逶迤出郊壇登髙見百里桑野鬱芊芊時平俯鵲巢嵗熟多人煙姦猾惟閉户逃亡歸種田回軒自郭南老幼滿馬前皆賀蠶農至而無徭役牽吾觀黎庶心撫之可萬全何幸逢大道願言烹小鮮誰能奏明主一試武城絃題尉遲將軍新廟即太守張公所建也周室既版蕩賊臣立嬰兒將軍獨激昻誓欲酬恩私孤城日無援髙節終可悲家國共淪亡精魂空在斯沈沈積寃氣寂寂無人知良牧懷深仁與君建明祠父子俱血食軒車每逶迤我來薦蘋蘩感歎興此詞晨光上階闥殺氣翻旌旗明明幽冥理至誠信莫欺唯夫二千石多慶方自兹送田少府貶蒼梧沉吟對遷客惆悵西南天昔為一官未得意今向萬里令人憐念兹斗酒成暌間停舟歎君日將宴逺樹應連北地春行人却羡南歸鴈丈夫窮逹未可知看君不合長數竒江山到處堪乘興楊桞青青那足悲別李景參離心匆悵然一作離憂匆浩然策馬對秋天孟諸薄暮涼風起歸客相逢渡睢水昨時攜手已十年今日分途各千里嵗物蕭條滿路岐此行浩蕩令人悲家貧羡爾有微祿欲往從之何所之送郭處士往萊蕪兼寄茍山人君為東蒙客往來東蒙畔雲卧臨嶧陽山行窮日觀少年詞賦皆可聼秀眉白面風清泠身上未曾染名利口中獨未知羶腥今日還山意無極豈辭世路多相識歸見萊蕪九十翁為論別後長相憶單父逢鄧司倉覆倉庫因而有贈邦牧今坐嘯羣賢趨紀綱四人忽不擾耕者遙相望粲粲府中妙授詞如履霜炎炎伏熱時草木無晶光匹馬度睢水清風何激揚校緡閲帑藏發廩欣斯箱邂逅得相逢歡言至夕陽開襟自公餘載酒登琴堂舉杯挹山川寓目窮毫芒白鳥向田盡青蟬歸路長醉中不惜別況乃正遊梁同韓四薛三東亭玩月逺遊悵不樂兹賞吾道存𣢾曲故人意辛勤清夜言東庭何寥寥佳境無朝昏階墀近洲渚户牖當郊原矧乃窮周旋遊時怡討論樹隂蕩瑤瑟月氣延清樽明河帶飛鴈野火連荒村對此更愁豫悠哉懷故園同敬八盧五泛河間新河清川在城下沿泛多所宜同濟愜數公玩物欣良時飄颻波上興燕婉舟中詞昔涉乃平原今來忽漣漪東流達滄海西流延滹池雲樹共晦眀井邑相逶迤稍隨歸月帆若與沙鷗期漁父更留我前潭水未滋同顔少府旅宦秋中七言傳君昨夜悵然悲獨坐一作卧新齋木落時逸氣舊來凌燕雀髙才何得混姸媸迹留黃綬人多嘆心在青雲世莫知不是鬼神無正直從來州縣有瑕疵同房侍御山園新亭與邢判官同遊隱隱春城外蒙蘢陳迹深君子顧榛莽興言傷古今決河導新流疏徑蹤舊林開亭俯川陸時景冝招尋肅穆逢使軒夤緣事登臨沗遊芝蘭室還對桃李隂岸逺白波來氣暄黃鳥吟因覩歌頌作始知經濟心灌壇有遺風單父多鳴琴誰為久州縣蒼生懷德音同李太守北池泛舟宴髙平鄭太守每挹龔黃事還陪李郭舟雲從四嶽起水向百城流幽意隨登陟嘉言即獻酬乃知縫掖貴今日對諸侯同馬太守聼九思法師講金剛經吾師晉陽寶傑出山河最途經世諦間心到空王外鳴鐘山虎伏説法天龍會了義同建瓴梵法若吹籟深知億劫苦善喻恆沙大捨施割肌膚攀緣去親愛招提何清淨良牧駐軒蓋露冕衆香中臨人覺苑內心持佛印久操割魔軍退願開初地因永奉彌天對送蔡少府赴登州推事膠東連即墨萊水入滄溟國小常多事人訛屢抵刑公才徴郡邑詔使出郊坰標格誰當犯風謡信可聼崢嶸大峴口邐迤汶陽亭地迥雲偏白天秋山更青祖筵方卜晝王事急侵星勸爾將為德斯言蓋有聼送韓九惆悵别離日徘徊岐路前歸人望獨樹匹馬隨秋蟬常與天下士許君兄弟賢良時正可用行矣莫徒然高常侍集卷四
