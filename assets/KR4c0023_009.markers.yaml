  - {type: variant, offset: 0, length: 3271, content: 欽定四庫全書髙常侍集巻九唐高適撰雜著鶻賦并序天寳初有自滑臺奉太守李公鶻賦以垂示適越在草澤才無能為尚懷知音遂作鶻賦其詞曰夫何鶻之為用置之則已縱之無匹懷果斷之沉潜任性情之敏疾頭小而銳氣雄而逸皃耿介以凌霜目精明而㸃漆想像遼逺孤貞深宻将必取而乃迴若授詞而勿失當白帝之用事入青雲而委質乃徇節以勃然因指縱而挺出嚴冬欲雪蔓草初焚野莽蕩而風𦂳天崢嶸而日曛忿頑兎之狡伏恥髙鳥之成羣始滅没以略地忽升騰而參雲翻决烈以電掣皆披靡而星分奔走者折脇而絶脰鳴噪者血灑而毛紛雖百中之自我終一呼而在君夫其左右更進縱横發跡掃窟穴之凌兢振荆榛之淅瀝翕六翮以直上交雙指以迅擊合連弩之應機類鳴􅐴之破的豁爾胷臆伊何凌厲以爽朗曾莫蠆芥豈虞險艱而怵惕觀其所獲多有得用非媒歴閶闔以肅穆翊鈎陳而環迴幸輝光於蒐狩承剪拂於樓臺望鳯沼而輕舉紛羽族之驚猜路杳杳而何向雲茫茫而不開鶯出谷兮徒爾鶴乘軒而何哉彼懐毅勇坎坷而弃置胡不效其間關而徘徊爾乃頋恩有地戀主多情念層空而不去託虚室以無驚雅節表於能讓義心激於效誠勢逾髙而下急體彌重而飛輕戢羽翼以受命若肝膽之必呈嗟日月之云邁猶羈縻而見嬰别有横大海而徑度順長風而一寫投足眇於巖巔脫身冥於弋者冰落落以凝閉雪皚皚而飄灑諒堅銳之時然寜苦寒之求捨匪聚食以祈滿聊擊群而自解比𤣥豹之潛形同幽人之在野矧其升巢絶壁獨立霜條心倐忽於萬里思超遙於九霄豈外物之能慕曷凡禽之見邀則未知鴛鷺之所適孰與夫鵬鷃之逍遙云爾㢤東征賦嵗在甲申秋窮季月髙子逰梁復乆方適楚以超忽望君門之悠㢤㣲先容以效拙姑不隠而不仕冝其漂淪而播越出東苑而遂行沿濁河而兹始感隋皇之敗徳劃平原而為此西馳洛汭東並淮涘地豁山開川流波委六宫景從千官邐迤龍舟錦㠶照耀乎數千百里大駕将去羣盗日起尸禄者巻舌而偷生直諌者解頥而後死寄腹心於梟獍任手足於蛇虺既受弑於匹夫尚興疑於愛子豈不為窮力役於征戰務淫逸於奢侈六軍悲牧野之師萬姓哭遼陽之鬼嗟顚覆於瞬目指年代於流水唯見長亭之煙火曠野之荆杞至鄼縣之舊邑懷蕭相之髙風既屈節於主吏每歸誠於沛公始俱起於天下乃從定於闗中推金帛於他人抱圖籍於我躬按山川之險阻救天地之屯蒙嘉盈俸以増邑方指蹤而建功納邵平以防患舉曹參而告終經洛城而永望想譙郡而銷憂慨魏武之雄圖終大濟於横流用兵戈以威四海挾天子而令諸侯乃擅命以誅伏徒矯跡以安劉吾始未知夫逆順胡寜比徳於殷周下符離之西偏臨彭城之髙岸連山鬱其莽蕩大澤平乎渺漫憶昔天未厭禍項氏叛渙解齊歸楚自蕭擊漢天地無色風塵潰亂憫君王之轗軻混士卒以奔散茍炎運之克昌豈生人之塗炭次靈壁之逆旅面垓下之遺墟嗟魯公之慷慨聞楚聲而悒於歌拔山以涕洟竊霸圖而莫居擯亞父之何甚悲虞姬之有餘出重圍以狼狽至隂陵以躊躇顧天亡以自負雖身死兮焉如登夏丘而縱目對蒲隧而愁予問取慮之斯在徴長直之捨諸宿徐縣之迴津惟偃王之舊域方以小而事大豈無位而有徳彼皆昏暴以喪邦伊何仁義而亡國髙延陵之掛劍慕班彪之述職緬沛水之悠悠俯婁林之紆直即日河滸依然泗上山川土田耳目清曠眺淮源之呀豁偉楚關之雄壮掛輕席於中流順長風以破浪過盱眙之邑屋傷義帝之波蕩歎三户之亡秦知萬人以離項越龜山而訪泊入漁浦而待潮鴻鴈飛兮木葉下楚歌悲兮雨瀟瀟霜封野樹水凍寒苖岸草無色蘆花自飄幸息肩扵人事願投迹於漁樵思魏闕而天逺向秦川而路遙侯鳴雞以進㠶趨亂流以争迅縱孤舟於浩大撫垂堂以誡慎遵枉一作在渚於淮隂徴昔賢於韓信哀王孫之寄食嘉漂母之無愠鄙亭長之不仁乃晨炊而嗇恡忽從龍以獲騁遂擒豹以自奮破全趙而用竒稱假齊而益振幸辭通而感惠俄結豨而謀釁當在約而必亨曷持盈而不順凌赤㟁之迢遞棹白波之紆餘歴山陽之村墅投襄鄙之邑居人多嗜艾俗喜觀漁連葭葦於郊甸雜汀洲於里閭感百川之朝宗彌結念於歸歟日杲杲以麗天雲飄飄以巻舒魯放情於蹈海丘永歎於乘桴遇坎則止吾今不知其所如哉繡阿育王像讃并序阿育王繡像竇氏女奉為亡妣太夫人蘇氏所建也嗚呼有以蓬首撡行柴立孝思仰昊天之茫茫對髙堂而泣血女之孝矣将感於神明婦之義矣可施於王化故能塵垢明鏡住持青蓮永惟宿因獨見諸浄以為霜雪風雨之思胡寜以報親功徳荘嚴之深冀以益吾親矣乃自方丈之室沛然廣大之願綵翠鮮秀光華可掬運夫心眼之靈盡如相好之美瞻仰圍繞涕淚是悲俾像敎之勿墜如佛身之有在夫莫大者孝也不泯者善也惟孝與善可以導逹幽冥則我太夫人宜歸淨土矣嗚呼孝之至也感人無窮乃為讃曰佛不可見兮法亦難知惟我荘嚴兮本乎孝思儻幽冥兮昭乎景福彼浄土者可得而歸之陳留郡上源新驛記周官行人掌邦國傳遽之事施於政者蓋有章焉皇唐之興盛於古制自京師四極經啓十道道列於亭亭實以駟而亭惟三十里駟有上中下豐屋美食供億是為人跡所窮帝命流洽用之逺者莫若於斯矣伊陳留雄稱山東聲殷海内昌大囂庶有梁魏之遺迹風煙雄兩河之眇襟帶控九州之半洎皇華軺傳夷使駿奔出關而馳南向北户山川水陸之役兆於是矣故上源所置舉其難哉居里之衝瀕河之陽地形湫隘館次卑狹巽在堤下靣於劇旁走庭以隅建歩終坎車靡方駕騎無並鞭其鬱閉有如此者壬辰嵗太守元公連率河南之三載也堯咨四岳而人神理漢詔八使而風俗清舉徳推賢事髙典策革已成之弊持獨斷之明迨兹郵亭俯視頽朽何逼側蹇淺不稱其聲将圖鼎新豈曰仍舊顧謂長史李公曰夫開釋故實發揮制度不有攸居者誰其允協今奏計闕前先甲而徃小大之務公其領之申命録事參軍馮元掌曰維操繩墨者蓋用於正藴亷慎者俾臨於財公以正身用財均力紀綱相佐善莫大焉復命浚儀令裴勝曰公之為縣也簡易於理訓迪其源秉清白之一門據忠信之餘地夫忠以創物清而守官立言有程指使而可於是北吞里室人以利遷也南豁路旅事無茍免也合土以峻墉攻木以髙户棟宇相翼羣材如生兹所謂動乃有經徐而不費於戲乆於否者宜以改作本於功者終乎永貞則亭之成焉我方許元公澄清之功也公時膺邁徳天與大才屬梁宋不登朝廷旰食求瘼之重不其然歟用能官去粃政人無菜色百城偃於迅風萬象納於明鏡乃因寮吏慨然於兹亭曰且夫木石之新者而猶可觀況人而自新孰不觀者又曰傳不云乎啓塞從時用之善者而今而後吾以無事為事焉君子是以知郵亭之可嘉而我公之清淨無窮也末吏不敏紀于貞石云送竇侍御知河西和糴還京序天子務西州之實嵗糴億計何始於貴取而終以耗稱俾邊兵受寒戰馬多痩輓域中之稅鑄海上之山江淮之人盖奔命矣豈財用之地抑以從来将利害之鄉猶有所闕廟堂精思其故表竇公自憲闈而董之開釋叢脞之病發揮鹵莽之極政之大者不其然歟今農夫力於必登亷賈知夫踊賤於戲若推斯之義以視天下之兵我幕府凉公勤勞王家常用此道干戈所適戎狄相弔冝哉八月既望公於是領錢榖之要歸奏朝廷副節制郎中裴公軍司馬貟外李公追臺閣之舊逰惜軒車之逺别席樓船於池上泛雲物於城下胡笳羌笛繚繞隈隩儛羅炫裝映帶洲渚醉後歡甚東林日髙語岐路於罇前指京華於天𣺌有若司直崔公之逸韻嘉其廷評數賢之間作適忝斯人之後敢拜首而敘云樊少府㕔師猛賛師猛志猛猛於師子紺眼星懸赤毛熖起銅爪鐡甲鋸牙鑿齒顧犀象則百隊山跧看熊羆則千羣野死以此言威威可知矣仙尉樊公寫象㕔中崑崙脚碎而屋壁欲動虎豹膽懾而訟庭已空稜稜兮隔簾飛霜颯颯兮滿院生風於是乎師子為百獸之長遂識樊公為百夫之雄罷職還京次睢陽祭張巡許逺文維乾元元年五月日太子詹事御史中丞髙適謹以清酌之奠敬祭於故御史中丞張許二公之靈中丞體質貞正才掩賢豪詩書自負州縣徒勞惆悵雄筆辛勤寶刀時平位下世亂節髙賊臣通逆國歩驚騷兩河震恐千里嗷嗷投袂洒泣據鞍鬱陶全譙入宋收梓捍曹心繫魏闕志清武牢帝曰嗟爾龍光豹韜憲臺戎幕持斧擁旄嗚呼予亦忝竊統兹介胄俄奉短書至夔狂冦褁粮訓卒逹曙通晝軍乃促程書亦封奏遂發驕勇俾驅鳥獸将無還心兵亦死鬬賊黨頻蹙我師旋漏十城相望百里不救豺狼嘯聚犬羊蟻湊積薪為梁决岸成竇嗚呼當此虎敵豈無强隣常時肝膽今日胡秦堅守半嵗絶糧數旬柹椽秣馬煮紙均人病不暇拯殁無全身煎熬甲胄啄嚙膠筋慷慨艱險凄涼苦辛嗚呼我辭淮楚将赴伊洛途出兹邦悲纒舊郭邑里灰燼城池墟落何九拒之崢嶸皆二賢之制作聲盖天壤氣横遼廓讓死争先臨危靡却嗚呼哀哉天亦難論萬夫開壁一旅纔存衰羸既竭力弱相吞䧟穽織路梯衝棧門土濠水合木柵雲屯居即無蔽突無其奔煙塵劔㦸逼側紛昏與求生而害義寜抗節以埋魂嗚呼悖逆殱潰干戈将止海岳澄清朝廷至理封功列爵懷黄拖紫傷哉二賢不預於此嗚咽孀婦伶俜愛子追贈方榮賞延兹始寂寂梁苑悠悠睢水黄蒿連接白骨填委思壮志於冥寞問遺形於荆杞列祭空城一悲永矣高常侍集巻九, SBCK: ''}
