  - {type: variant, offset: 0, length: 208, content: 欽定四庫全書高常侍集巻五唐高適撰詩登子賤琴堂賦詩三首并序甲申嵗適登子賤琴臺賦詩三首首章懐宓公之徳千祀不朽次章美太守李公能嗣子賤之政再造琴臺末章多邑宰崔公能繼子賤之理其一宓子昔為政鳴琴登此臺琴和人亦閑千載稱其才臨眺忽悽愴人琴安在哉悠悠此天壤唯有頌聲来其二邦伯感遺事慨然建琴堂乃知靜者心千載猶相望入室想其人出門何茫茫唯見白雲合東臨鄒魯鄉其三皤皤邑中老自誇邑中理何必昇君堂然後知君美開門無犬吠早臥常晏起昔人不忍欺今我還復爾, SBCK: ''}
