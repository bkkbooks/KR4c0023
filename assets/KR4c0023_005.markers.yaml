  - {type: variant, offset: 643, length: 422, content: 同崔貟外綦母拾遺九日宴京兆府李士曹今日好相見羣賢仍廢曹晚晴催翰墨秋興引風騷絳葉擁虛砌黄花隨濁醪閉門無不可何事更登高送蹇秀才赴臨洮悵望日千里如何今二毛猶思陽谷去莫厭隴山髙倚馬見雄筆隨身唯寶刀料君終自致勲業在臨洮同李九士曹觀壁畫雲作始知帝郷客能畫蒼梧雲秋天萬里一片色只疑飛盡猶氛氲同薛司直秋霽曲江俯見南山作南山鬱初霽曲江湛不流若臨瑶池間一作前想望崑崙丘迴首見黛色眇然波上秋深沉俯崢嶸清淺延阻脩連潭萬木影插岸千巖幽杳藹信難測淵淪無暗投片雲對漁父獨鳥隨虛舟我心寄青霞世事慙白鷗得意在乘興忘懐非外求良辰自多暇忻與數子逰送崔功曹赴越傳有東南別題詩報客居江山知不厭州縣復何如莫恨呉歈曲當㸔越絶書今朝欲乘興隨爾食鱸魚夜別韋司士得成字髙館張燈酒復清夜鐘殘月鴈歸聲只言啼鳥堪求侣無那春風欲送行黄河曲裏沙為岸白馬津邊栁向城莫怨他鄉暫離別知君到處有逢迎送別昨夜離心正鬱陶三更白露西風髙螢飛木落何淅􅅹此時夢見西歸客曙鐘寥亮三四聲東隣嘶馬使人驚攬衣出户一相送唯見歸雲縱復横, SBCK: ''}
