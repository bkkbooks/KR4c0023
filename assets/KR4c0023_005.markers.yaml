  - {type: variant, offset: 1128, length: 745, content: 淇上别業依依西山下别業桑林邊庭鴨喜多雨隣雞知暮天野人種秋菜古老開原田且向世情逺吾今聊自然魯西至東平沙岸泊不定石橋水横流問津見魯谷一作俗懐古傷家丘寥落千載後空傳襃聖侯淇上送韋司倉徃滑臺飲酒莫辭醉醉多適不愁孰知非逺別終念對窮秋滑臺門外見淇水眼前流君去應迴首風波滿渡頭别董大二首六翮飄颻私自憐一離亰洛十餘年丈夫貧賤應未足今日相逢無酒錢十里黄雲白日曛北風吹鴈雪紛紛莫愁前路無知已天下誰人不識君同陳留崔司户早春宴蓬池同官載酒出郊圻晴日東馳鴈北飛隔岸春雲邀翰墨傍簷垂栁報芳菲池邊轉覺虚無盡臺上偏宜酩酊歸州縣徒勞那可度後時連騎莫相違送桂陽孝亷桂陽年少西入秦數經甲科猶白身即今江海一歸客他日雲霄萬里人崔司録宅宴大理李卿多雨殊未已秋雲更沉沉洛陽故人初解印山東小吏来相尋上卿才大名不朽早朝至尊暮求友豁達常推海内賢慇懃但酌樽中酒飲醉欲言歸剡溪門前駟馬光照衣路傍觀者徒唧唧我公不以為是非淇上别劉少府子英近来住淇上蕭條維空林又非耕種時閑散多自任伊君獨知我驅馬欲招尋千里忽擕手十年同苦心求仁見交態於道喜甘臨逸思乃天縱㣲才應陸沉飄然歸故鄉不復問離襟南登黎陽渡莽蒼寒雲隂桑葉原上起河凌山下深途窮更逺別相對益悲吟使青夷軍入居庸三首登頓驅征騎棲遲愧寳刀逺行今若此㣲禄果徒勞絶坂水連下羣峯雲共髙自堪成白首何事一青袍匹馬行将乆征途去轉難不知邊地别秪訝客衣單溪冷泉聲苦山空木葉亁莫言闗塞極雲雪尚漫漫古鎮青山口寒風落日時巖巒鳥不過氷雪馬堪遲出塞應無策還家賴有期東山足松桂歸去結茅茨自薊北歸驅馬薊門北北風邊馬哀蒼茫逺山口豁達胡天開五将已深入前軍止半迴誰憐不得意長劍獨歸来送兵到薊北積雪與天逈屯軍連塞愁誰知此行邁不為覔封侯途中寄徐録事比以王書見贈落日風雨至秋天鴻鴈初離憂不堪比旅館復何如君又㡬時去我知音信疎空多箧中贈長見右軍書高常侍集巻五, SBCK: ''}
