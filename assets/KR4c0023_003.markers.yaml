  - {type: variant, offset: 188, length: 263, content: 留别鄭三韋九兼洛下諸公七言憶昨相逢論乆要顧君哂我輕常調羈旅雖同白社游詩書已作青雲料蹇躓一作步蹉跎竟不成年過四十尚躬耕長歌達者杯中物大一作冷笑前人身後名幸逢明盛多招隠髙山大澤徵求盡此時亦一作也得辭漁樵青袍裹身荷聖朝犂牛釣竿不復見縣人邑吏来相邀逺路鳴蟬秋興發華堂美酒離憂銷不知何時更攜手應念兹辰去折腰封丘縣我本漁樵孟諸野一生自是悠悠者乍可狂歌草澤中寜堪作吏風塵下秪言小邑無所為公門百事皆有期拜迎官長心欲碎鞭撻黎庶令人悲歸来向家問妻子舉家盡笑今如此生事應須南畝田世情付與東流水夢想舊山安在哉為銜君命日遲迴乃知梅福徒為爾轉憶陶濳歸去来, SBCK: ''}
