  - {type: variant, offset: 1280, length: 440, content: 題李別駕壁去鄉不逺逢知已握手相歡得如此禮樂遥一作猶傳魯伯禽賔客爭過魏公子酒筵莫散明月上櫪馬長鳴春風起一生稱意能㡬人今日從君問終始送前衛縣李寀少府黄鳥翩翩楊栁垂春風送客使人悲怨別自驚千里外論交却憶十年時雲開汶水孤㠶逺路繞梁山疋馬遲此地從来可乘興留君不住益悽其除夜作旅館寒燈獨不眠客心何事轉悽然故鄉今夜思千里愁鬢眀朝更一年初至封丘作可憐薄暮宦游子獨卧虚齋思無已去家百里不得歸到官數日秋風起邯鄲少年行邯鄲城南遊俠子自矜生長邯鄲裏千塲縱博家仍富㡬處報讐身不死宅中歌笑日紛紛門外車馬如雲屯未知肝膽向誰是令人却憶平原君君不見今人交態薄黄金用盡還踈索以兹感歎辭舊游更於時事無所求且與少年飲美酒往来射獵西山頭古大梁行古城莽蒼饒荆榛驅馬荒城愁殺人魏王宫觀盡禾黍信陵賔客隨灰塵憶昨雄都舊朝市軒車照耀歌鍾起軍容帶甲三十萬國歩連營一千里全盛須臾那可論高臺曲池無復存遺墟但見狐狸跡古地空餘草木根暮天揺落傷懐抱撫劍悲歌對秋草俠客猶傳朱亥名行人尚識夷門道白璧黄金萬户侯寳刀駿馬填山丘年代淒凉不可問往来惟見水東流, SBCK: ''}
