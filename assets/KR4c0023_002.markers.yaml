  - {type: variant, offset: 2221, length: 444, content: 堅同朱五題盧使君義井高義唯良牧深仁自下車寜知鑿井處還是飲冰餘地即泉源乆人當汲引初體清能鑒物色洞每含虚上善滋来往中和浹里閭濟時應未竭懷惠復何如同衛八題陸少府書齋知君薄州縣好靜無冬春散帙至棲鳥眀燈留故人深房臘酒熟高院梅花新若是周旋地當令風義親同郭十題楊主簿新㕔華館曙沈沈惟良正在今用材兼柱石開物象高深更得芝蘭地兼榮枳棘林向風扄㦸户當署近棠隂勿改安卑節聊閑理劇心多君有知已一和郢中吟送張瑶貶五溪尉他日惟楨榦明時懸鏌鎁江山遥去國妻子獨還家離別無嫌逺沈浮勿强嗟南登有詞賦知爾弔長沙送魏八更沽淇上酒還汎驛前舟為惜故人去復憐嘶馬愁雲山行處合風雨興中秋此路無知已明珠莫暗投別韋五徒然酌杯酒不覺散人愁相識仍逺別欲歸翻旅游夏雲滿郊甸明月照河洲莫恨征途逺東看漳水流別劉大校書昔日亰華去知君才望新應猶作賦好莫歎在官貧且復傷逺别不然愁此身青楓㡬萬里江上一歸人宋中別司功叔各賦一物得商商丘試一望隠隠帶秋天地與星辰在城将大路遷干戈悲昔事墟落對窮年即此傷離緒凄凄酒賦筵送蔡十二之海上時在衛中黯然何所為相對益悲酸季弟念離別, SBCK: ''}
