  - {type: variant, offset: 0, length: 523, content: 欽定四庫全書髙常侍集巻二唐髙適撰詩陪竇侍御靈雲南亭宴詩并序得雷字凉州近胡髙下其池亭盖以耀蕃落也幕府董帥雄勇徑踐戎庭自陽關而西猶枕席矣軍中無事君子飲食宴樂宜哉白簡在邊清秋多興况水具舟檝山兼亭臺始臨泛而寫煩俄登陟以寄傲絲桐徐奏林木更爽觴葡萄以遞歡指蘭茝而可掇胡天一望雲物蒼然雨蕭蕭而牧馬聲斷風嫋嫋而邊歌㡬處又足悲矣貟外李公曰七日者何牛女之夕也夫賢者何得謹其時請賦南亭詩列之於後人幽宜眺聽目極喜亭臺風景知愁在關山憶夢迴祗言殊語黙何意忝逰陪連唱波瀾動冥搜物象開新秋歸逺樹殘雨擁輕雷簷外長天盡樽前獨鳥来常吟塞下曲多謝幕中才河漢徒相望嘉期安在哉陪竇侍御泛靈雲池得風字白露時先降清川思不窮江湖仍塞上舟檝在軍中舞換臨津樹歌饒向逈風夕陽連積水邊色滿秋空乗興宜投轄邀歡莫避騘誰憐持弱羽猶欲伴鴛鴻和竇侍御登涼州七級浮圖之作化塔屹中立孤髙宜上躋鐵冠雄賞眺金界寵招攜空色在軒户邊聲連皷􅎏天寒萬里北地豁九州西清興揖才彦峻風和端倪始知陽春後具物皆筌蹄金城北樓北樓西望滿晴空積水連山勝畫中湍上急流聲若箭城頭殘月勢如弓垂竿已謝磻溪老體道猶思塞上翁為問邊庭更何事至今羌笛怨無窮武威同諸公過楊七山人得藤字幕府日多暇田家嵗復登相知恨不早乗興乃無恒窮巷在喬木深齋垂古藤邊城惟有醉此外更何能, SBCK: ''}
