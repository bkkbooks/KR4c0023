  - {type: variant, offset: 1628, length: 289, content: 漁父歌曲岸深潭一山叟駐眼看鈎不移手世人欲得知姓名良乆問他不開口笋皮笠子荷葉衣心無所營守釣磯料得孤舟無定止日暮持竿何處歸魯秋胡妾本邯鄲未嫁時容華倚翠人未知一朝結髮從君子将妾迢迢東魯陲時逢大道無艱阻君方游宦從陳汝蕙樓獨卧頻度春彩閣辭君㡬徂暑三月垂楊蠶未眠攜籠結侣南陌邉道逢行子不相識贈妾黄金買少年妾家夫壻經離乆寸心誓與長相守碩言行路莫多情道妾貞心在人口日暮蠶饑相命歸攜籠端飾来庭闈勞心苦力終無恨所貴一作冀君恩那可依聞說行人已歸止乃是向来贈金子相看顔色不復言相顧懐慙有何已從来自隠無疑背直為君情也相㑹如何咫尺仍有情况復迢迢千里外誓将顧恩不顧身念君此日赴河津莫道向来不得意故欲留規誡後人, SBCK: ''}
