  - {type: variant, offset: 2399, length: 0, content: '', SBCK: 登子賤琴堂賦詩三首并序甲申􅀊適登子賤琴堂賦詩三首首章懷宓公之德千祀不朽次章美太守李公能嗣子賤之政再造琴臺末章多邑宰崔公能思子賤之理宓子昔爲政鳴琴登此䑓琴和人亦閑千載稱其才臨眺忽悽愴人琴安在哉悠悠此天壤唯有頌聲來邦伯感遺事􅁣然建琴堂乃知靜者心千載猶相望入室想其人出門何茫茫唯見白雲合東臨鄒魯郷皤皤邑中老自誇邑中理何必升君堂然後知君美開門無犬吠早卧常晏起昔人不忍欺今我還復爾同薛司直諸公秋霽曲江俯見南山作南山鬰􅀄霽曲江湛不流􅀂臨瑶池間想望崑崙丘􅅆首見黛色眇然波上秋深沉俯峥嶸清淺延阻修連潭萬木影揷㟁千巖幽杳藹信難測淵淪無暗投片雲對漁父獨鳥隨虚舟我心􅀉青霞世事慙白鷗得意在乗興忘懷非外求良辰自多暇忻與數子逰魯西至東平沙岸泊不定石橋水橫流問津見魯谷懷古傷家丘寥落千載後空傳襃聖侯淇上別劉少府子英近來住淇上蕭條惟空林又非耕種時閑散多自任伊君獨知我驅馬欲招㝷千里忽携手十年同苦心求仁見交態於道喜甘臨逸思乃天縱微才應陸沉飄然歸故鄕不復問離􅁭南登黎陽渡莾蒼寒雲隂桑葉原上起河凌山下深途窮更逺别相對益悲吟别耿都尉四十能學劒時人無此心如何耿夫子感激投知音翩翩白馬來二月青草深别易小千里興酣傾百金宋中遇林慮楊十七山人因而有别昔余渉漳水驅車行鄴西遥見林慮山蒼蒼戞天倪邂逅逢爾曹􅀃君彼巖棲蘿徑垂野蔓石房倚雲梯秋韭何青青藥苗數百畦栗林隘谷口枯􅀣森廻溪耕耘有山田紡績有山妻人生苟如此何必組與珪誰謂逺相訪曩情殊不迷簷前舉醇醪竈下烹隻雞朔風忽振蕩昨夜寒螿啼逰子益思歸罷琴傷解擕出門盡原野白日黯巳低始驚道路難終念言􅀏睽因聲謝岑壑歳暮一攀躋苦雨􅀉房四昆季獨坐見多雨况兹兼索居茫茫十月交窮隂千里餘彌望無端倪北風擊林箊白日眇難覩黃雲争卷舒安得造化功曠然一掃除滴瀝簷宇愁寥寥談笑踈泥塗擁城郭水潦盤丘􅇕惆悵憫田農徘徊傷里閭曾是力井稅曷爲無斗儲萬事切中懷十年思上書君門嗟緬邈身計念居諸沉吟顧草茅鬰怏任盈虚黃鵠不可羡鳴鷄時起予故人平臺側高館臨通衢兄弟方荀陳才華冠應徐彈碁自多暇飲酒更何如知人想林宗直道慙史魚携手流風在開􅁭鄙吝袪寧能訪窮巷相與對園􅂼别張少府歸客􅅏不住朝雲縱復橫馬頭向春草斗柄臨高城嗟我乆離别羡君看弟兄歸心更難道回首一傷情酬馬八効古見贈深崖生緑竹秀色徒氛氲時代種桃李無人顧此君柰何氷雪操尚與蒿萊群願託靈仙子一吹聲入雲送崔録事赴宣城大國非不理小官皆用才欲行宣城印住飲洛陽杯晚景爲人别長天無鳥廻舉㠶風波􅄅倚棹江山來羡爾兼乗興蕪湖千里開宋中别李八􅀊晏誰不歸君歸意可􅀃將趍倚門望還念同人別駐馬臨長亭飄然事明發蒼茫眺千里正值苦寒節舊國多轉蓬平䑓下明月世情薄庇賤夫子懷賢哲行矣各勉旃吾當挹餘烈}
