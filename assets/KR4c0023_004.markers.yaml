  - {type: variant, offset: 1363, length: 252, content: 送田少府貶蒼梧沉吟對遷客惆悵西南天昔為一官未得意今向萬里令人憐念兹斗酒成暌間停舟歎君日将宴逺樹應連北地春行人却羡南歸鴈丈夫窮逹未可知看君不合長數竒江山到處堪乘興楊桞青青那足悲別李景參離心怱悵然一作離憂怱浩然策馬對秋天孟諸薄暮涼風起歸客相逢渡睢水昨時攜手已十年今日分途各千里嵗物蕭條滿路岐此行浩蕩令人悲家貧羡爾有微禄欲往從之何所之送郭處士往莱蕪兼寄茍山人君為東蒙客往来東䝉畔雲卧臨嶧陽山行窮日觀少年詞賦皆可聼秀眉白面風清泠身上未曾染名利口中獨未知羶腥今日還山意無極豈辭世路多相識歸見莱蕪九十翁為論別後長相憶, SBCK: ''}
