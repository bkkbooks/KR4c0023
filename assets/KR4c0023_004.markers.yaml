  - {type: variant, offset: 2405, length: 0, content: '', SBCK: 五言古詩宋中别周梁李三子曽是不得意適來兼别離如何一樽酒翻作滿堂悲周子負高價梁生多逸詞周旋梁宋間感激建安時白雪正如此青雲無自疑李侯懷英雄骯􅗣乃天資方寸且無間衣冠當在斯俱爲千里逰勿念兩鄉辭且見壯心在莫嗟擕手遲涼風吹北原落日滿西陂露下草初白天長雲屢滋我心不可得君􅀆定何之亰洛多知已誰能憶左思酬别薛三蔡大􅅏簡韓十四主簿迢逓辭亰華辛勤異鄕縣豋高俯滄海廻首淚如霰同人久離别失路還相見薛侯懷􅀡道德業應時選蔡子􅀒清才當年擢賓薦韓公有奇節詞賦凌群彦讀書嵩岑間作吏滄海甸伊余寡棲託感激多愠見縱誕韭爾情漂淪任疵賤忽枉瓊瑶作乃深平生眷始謂吾道存終嗟客逰倦歸心無晝夜别事除言宴復值涼風時蒼茫夏雲變薊門不遇王之渙郭宻之因以􅅏贈適逺登薊丘茲晨獨搔屑賢交不可見吾願終難􅀃迢逓千里逰羈離十年别才華仰清興功業嗟芳節曠蕩阻雲海蕭條帯風雪逢時事多謬失路心彌折行矣勿重陳懷君但愁絶送虞城劉明府謁魏郡苗太守天官蒼生望出入承明廬肅肅領舊藩皇皇降璽書茂宰多感激良將復吹嘘永懷一言合誰謂千里踈對酒忽命駕兹情何起予炎天晝如火極目無行車長路出雷澤浮雲歸孟諸魏郡十萬家歌鍾喧里閭傳道賢君至閉􅀜常晏如君將挹高論定是問樵漁今日逢明聖吾爲陶隱居酬秘書弟兼寄幕下諸公并序乙亥􅀊適徴詣長安時侍史楊公任通事舎人詩書起予蓋終日矣今年適自封丘尉統吏卒於青夷途經博陵得太守賈公之政相見如􅃇他日之意存焉司業張侯周旋迨兹僅三十載將疇昔是好匪窮逹之異乎族弟祕書鴈序之白眉者風塵一别俱東西南北之人愴然相逢適與願契旅館之暇長懷益增因賦是詩愧非六義之流也亞相膺時傑群才遇良工翩翩幕下來拜賜甘泉宫信知命世竒適會非常功侍御執邦憲清詞煥春叢末路望繡衣他時常發􅀩孰云三軍壯懼我彈射雄誰謂萬里遥在我罇爼中光禄經濟􅄊精微自深􅂨前席屢榮問長城兼在躬髙縱激頽波逸翮馳蒼穹將副節制籌欲令沙漠空司業至應徐雅度思冲融相思三十年憶昨猶兒童今來抱青紫忽若披鵷鴻􅀃劒増慷慨論交持始終祕書即吾門虚白無不通多才陸平原碩學鄭司農獻封到關西獨歩歸山東永意久知處嘉言能亢宗客從梁宋來行役随轉蓬酬贈欣元弟憶賢瞻數公逰鱗戯滄浪鳴鳯棲梧桐並􅀒垂天翼俱乗破浪風耽耽天府間偃仰誰敢同何意搆廣厦翻然顧雕􅆉應知阮歩兵惆悵此途窮淇上酬薛三椽兼寄郭少府自從别京華我心乃蕭索十年守章句萬事空寥落北上登薊門茫茫見沙漠倚劒對風塵慨然思衞霍拂衣去燕趙驅馬悵不樂天長滄洲路日暮邯鄲郭酒肆或淹􅅏漁潭屢栖泊獨行備艱險所見窮善惡永願拯芻蕘孰云干鼎鑊皇情念淳古時俗何浮薄理道資任賢安人在求瘼故交􅀒靈竒逸氣抱蹇諤隱軫經濟具縱横建安作才望忽先鳴風期無宿諾飄颻勞州縣迢逓限言謔東馳眇貝丘西顧彌􅉑畧淇水徒自流浮雲不堪託吾謀適可用天路豈寥廓不然買山田一身與耕鑿且欲同鷦鷯焉能志鴻鶴酬岑二十主簿秋夜見贈之作舎下蛩亂鳴居然自蕭索緬懷高秋興忽枉清夜作感物我心勞涼風驚二毛池空菡蓞死月出梧桐髙如何異鄕縣復得交才彦汩没嗟後時蹉跎耻相見箕山别來久魏闕誰不戀獨有江海心悠然未嘗倦苦雪四首二月猶北風天隂雪􅁳􅄀寥落一室中悵然慙百靈苦愁正如此門桞復青青惠連發清興􅀽安念高卧余故非斯人爲性兼􅂴惰頼兹罇中酒終日聊自過濛􅄥灑平陸浙瀝至幽居且喜􅃳群物焉能悲斗儲故交久不見鳥雀投吾廬孰云久閒曠本自保知寡窮巷獨無成春條秪盈把安能羡鵬舉且欲歌牛下乃知古時人亦有如我者登廣陵棲靈寺塔淮南冨豋臨兹塔信奇最􅀡上造雲族慿虚納天􅄜逈然碧海西獨立飛鳥外始知高興盡適與賞心㑹連山黯呉門喬木吞楚塞城池滿窓下物象歸掌内逺思駐江帆暮情結春靄軒車疑蠢動造化資大塊何必了無身然後知所退魯郡途中遇徐十八録事誰謂嵩頴客遂經鄒魯郷前臨少昊墟始覺東􅀩長獨行豈吾心懷古激中腸聖人久巳矣㳺夏遥相望徘徊野澤間左右多悲傷日出見闕里川平如汶陽弱冠負高節十年思自強終年不得意去去任行藏酬鴻臚裴主簿雨後睢陽北樓見贈之作暮霞照新晴歸雲猶相逐有懷晨昏暇想見登眺目問禮侍彤䄡題詩訪茅屋高樓多古今陳事滿陵谷地久微子封䑓餘孝王築徘徊顧霄漢豁逹俯川陸逺水對秋城長天向喬木公門何清净列㦸森巳肅不歎携手稀恒思着鞭速終當拂羽翰輕舉隨鴻鵠薊門五首薊門逢古老獨立思氛氲一身旣零丁頭􅁂白紛紛勲庸今已矣不識霍將軍漢家能用武開拓窮異域戍卒猒糟糠降胡飽求食􅀜亭試一望吾欲涕沾臆􅁁城十一月雨雪亂霏霏元戎號令嚴人馬亦輕肥羗胡無盡日征戰㡬時歸幽州多􅀐射結髪重横行一朝事將軍出入有聲名紛紛獵秋草相向角弓鳴黯黯長城外日没更煙塵胡騎雖慿陵漢兵不顧身古􅀣滿空塞黃雲愁殺人同群公宿開善寺贈陳十六所居駕車出人境避暑投僧家徘徊龍象側始見香林花讀書不及經飲酒不勝茶知君悟此道所未披袈裟談空忘外物持誡破諸邪則是無心地相看唯月華同群公秋登琴臺古跡使人感琴䑓空寂寥靜然顧遺塵千載如昨朝臨眺自茲始群賢乆相邀德與形神髙孰知天地遥四時何倐忽六月鳴秋蜩萬象歸白帝平川橫赤霄猶是對夏伏㡬時有涼飈燕雀滿簷楹鴻鵠摶扶摇物性各自得我心在漁樵兀然還復醉尚握樽中瓢同群公出獵海上畋獵自古昔况伊心賞俱偶與群公逰曠然出平蕪層隂漲溟海殺氣窮幽都鷹隼何翩翩馳聚相傳呼豺狼竄榛莾麋鹿罹艱虞高鳥下騂弓困獸闘匹夫塵驚大澤晦火燎深林枯失之有餘恨􅀗者無全軀咄彼工拙間恨非指蹤徒猶懷老氏訓感歎此歡娯同群公題鄭少府田家鄭侯應恓惶五十頭盡白昔爲南昌尉今作東郡客與語多逺情論心知所益秋林旣清曠窮巷空浙瀝蝶舞園更閒雞鳴日云夕男兒未稱意其道固無適勸君且杜門勿嘆人事隔同群公題中山寺平原十里外稍稍雲巖深遂及清凈所都無人世心名僧既禮謁高閣復登臨石壁􅀝松徑山田多栗林超遥盡巘􅔌逼側仍嶇嶔吾欲休世事於焉聊自任李雲南征蠻詩并序天寶十一載有詔伐西南夷右相楊公兼節制之􅀉乃奏前雲南太守李宓渉海自交趾擊之道路險艱徃復數萬里盖百王所未通也十二載四月至於長安君子是以知廟堂使能而李公効節適忝斯人之舊因賦是詩聖人赫斯怒詔伐西南戎肅穆廟堂上深沉節制雄遂令感激士得見非常功料死不料敵顧恩寧顧終鼔行天海外轉戰蠻夷中梯巘近高鳥穿林經毒虫􅀑門無歸客北戸多南風蜂蠆隔萬里雲雷隨九攻長驅大浪破急擊群山空餉道忽巳逺縣軍垂欲窮精誠動白日憤薄連蒼穹野食掘田䑕晡餐兼僰僮􅀵兵列亭堠拓地彌西東臨事耻苟免􅂂危能飭躬將星獨照耀􅁁色何溟􅄥瀘水夜可渉交州今始通歸來長安道召見甘泉宫㢘藺􅀂未死孫吳知暗同相逢論意氣慷慨謝深􅂨豋百丈峯二首朝豋百丈峰遥望燕支道漢壘青􅄀間胡天白如掃憶昔霍將軍連年此征討匈奴終不㓕寒山徒草草唯見鴻鴈飛令人傷懷抱晉武輕後事惠皇終巳昏豺狼塞􅈆洛胡羯爭乾坤四海如􅂦沸五原徒自尊而今白庭路猶對青陽門朝市不足問君臣隨草根酬裴員外以詩代書少時方浩蕩遇物猶塵埃脫略身外事交逰天下才單車入燕趙獨立心悠哉寧知戎馬間忽展平生懷且欣清論高豈顧夕陽頽題詩碣石館縱酒燕王臺北望沙漠垂漫天雪皚皚臨􅁁無策畧覧古空徘徊樂毅吾所憐㧞齊翻見猜荆卿吾所悲適秦不復廻然諾多死地公忠成禍胎與君從此辭毎恐流年催如何俱老大始復􅁯形骸兄弟真二陸聲華連八裴乙未將星變賊臣候天災胡􅀐犯龍山乗輿經馬嵬千官無倚着萬姓徒悲哀誅吕鬼神動安劉天地開奔波走風塵倐忽值雲雷擁旄出淮甸入幕徴楚材誓當剪鯨鯢永以竭駑駘小人胡不仁䜛我成死􅁅頼得日月明照耀無不該留司洛陽宫詹府唯蒿莱是時掃氛祲尚未殱渠魁背河列長圍師老將亦乖歸軍􅇵風火散卒争椎埋一夕􅈆洛空生靈悲􅁀腮衣冠投草莾予欲馳江淮登頓宛葉下栖遑襄鄧隈城池何蕭條邑屋更崩摧縱橫荆􅁄叢但見瓦礫堆行人無血色戰骨多青苔遂除彭門守因得朝玉階激昻仰鴛鷺獻替欣塩梅驅傳及逺蕃憂思鬱難排罷人紛争訟賦稅如山崖所思在畿甸曾是魯宓儕自從拜郞官列宿煥天街那能訪遐僻還復􅀉瓊􅅛金玉本髙價塤箎終易諧朗詠臨清秋凉風下庭槐何意冦盗間獨稱名義偕辛酸陳侯誄嘆息季膺杯白日屢分手青春不再來卧看中散論愁憶太常齋酬贈徒爲爾長歌還自咍酬龎十兵曹憶昔逰亰華自言生羽翼懷書訪知巳末路空相識許國不成名還家有慙色託身從畎畒浪跡初自得雨澤感天時耕耘忘帝力同人洛陽至問我睢水北遂爾欵津涯凈然見胸臆高談懸物象逸韻投翰墨别岸逈無垠海鶴鳴不息梁城多古意擕手共悽惻懷賢想鄒枚登高思荆􅁄世情惡庇賤之子憐􅀌直酬贈感并深離憂豈終極和崔二少府登楚丘城作故人亦不遇異縣乆栖託辛勤失路意感嘆登樓作清晨眺原野獨立窮寥廓雲散芒碭山水還睢陽郭遶梁即􅁭帯封衞多漂泊事古悲城池年豐愛墟落相逢俱未展携手空蕭索何意千里心仍求百金諾公侯皆我軰動用在謀略聖心思賢才朅來刈葵藿同吕員外酬田著作幕門軍西宿盤山秋夜作磧路天甲秋􅁁城夜應永遥傳戎旅作巳報􅀜山冷上將頓盤坂諸軍徧泉井綢繆閫外書慷􅁣幕中請能使勲業髙動令氛霧屏逺途能自致短歩終難騁羽翮時一看窮愁始三省人生感然諾何啻􅀂形影白髪知苦心陽春見佳境星河連塞絡刁斗兼山靜憶君霜露時使我空引領哭裴少府世人誰不死嗟君非生慮扶病適到官田園在何處公才群吏感棄事他人助余亦未識君悲哭君去高常侍集卷第四高常侍集卷第五七言古詩燕歌行并序開元二十六年客有從元戎出塞而還者作燕歌行以示適感征戍之事因而和焉漢家煙塵在東北漢將辭家破􅋊賊男兒本自重横行天子非常賜顔色摐金伐鼓下榆􅀜旌斾逶迤碣石間校尉羽書飛瀚海單于獵火照狼山山川蕭條極􅁁土胡騎慿陵雜風雨戰士軍前半死生羙人帳下猶歌舞大漠窮秋塞草腓􅀌城落日闘兵稀身當恩遇常輕敵力盡關山未解圍鐡衣逺戌辛勤乆玉筋應啼别離後少婦城南欲斷膓征人薊北空回首􅁁庭飄颻那可度絶域蒼茫無所有殺氣三時作陣雲寒聲一夜傳刁斗相看白刃雪紛紛死節從來豈顧勲君不見沙場征戰苦至今猶憶李將軍行路難二首長安少年不少錢能騎駿馬鳴金鞭五侯相逢大道邊美人絃管争􅅏連黄金如斗不敢惜片言如山莫棄􅂢安知顦顇讀書者暮宿靈䑓私自憐君不見冨家翁舊時貧賤誰比數一朝金多結豪貴百事勝人徤如虎子孫成行滿眼前妻能管絃妾歌舞自矜一身忽如此却笑傍人獨愁苦東陵少年安所如席門窮巷出無車有才不肯學干謁何用年年空讀書别韋參軍二十解書劒西逰長安城舉頭望君門屈指取公卿國風冲融邁三五朝廷歡樂彌寰宇白璧皆言賜近臣布衣不得干明主歸來洛陽無負郭東過梁宋非吾土兎􅁐爲農􅀊不登鴈池垂釣心長苦世人向我同衆人唯君於我最相親且喜百年有交態未嘗一日辭家貧彈棊擊筑白日晚縱酒高歌楊柳春歡娯未盡分散去使我惆悵驚心神丈夫不作兒女别臨􅄮涕淚沾衣巾送蔡山人東山布衣明古今自言獨未逢知音識者閱見一生事到處豁然千里心看書學劒長辛苦近日方思謁明主斗酒相􅅏醉復醒悲歌數年淚如雨丈夫遭遇不可知買臣主父皆如斯我今蹭蹬無所似看爾崩騰何若爲漁父歌曲岸深潭一山叟駐眼看鈎不移手世人欲得知姓名良久問他不開口笋皮笠子荷葉衣心無所營守釣磯料得􅀌舟無定止日暮持竿何處歸秋胡行妾本邯鄲未嫁時容華􅀝翠人未知一朝結髪從君子將妾迢迢東路陲時逢大道無難阻君方逰宦從陳汝蕙樓獨卧頻度春彩落辭君㡬徂暑三月垂楊􅁞未眠携籠結侣南陌􅁁道逢行子不相識贈妾黄金買少年妾家夫婿經離久寸心誓與長相守願言行路莫多情道妾貞心在人口日暮􅁞飢相命歸擕籠端飾來庭闈勞心苦力終無恨所冀君恩那可依聞􅀃行人巳歸止乃是向來贈金子相看顔色不復言相顧懷慙有何巳從來自隱無疑背直爲君情也相會如何咫尺仍有情况復迢迢千里外誓將顧恩不顧身念君此日赴河津莫道向來不得意故欲􅅏規誡後人留别鄭三韋九兼洛下諸公憶昨相逢論乆要顧君哂我輕常調羇旅雖同白社逰詩書已作青雲料蹇躓蹉跎竟不成年過四十尚躬耕長歌逹者杯中物大􅀏前人身後名幸逢明聖多招隱髙山大澤徴求盡此時亦得辭漁樵青袍褁身荷聖朝犁牛釣竿不復見縣令邑吏來相邀逺路鳴蟬秋興發華堂美酒離憂銷不知何時更擕手應念茲晨去折腰封丘縣我本漁樵孟諸野一生自是悠悠者乍可狂歌草澤中寧堪作吏風塵下秪言小邑無所爲公門百事皆有期拜迎官長心欲碎鞭撻􅀺庶令人悲歸來向家問妻子舉家盡􅀏今如此生事應須南畒田世情付與東流水夢想舊山安在哉爲銜君命日遲廻乃知梅福徒爲爾轉憶陶濳歸去来題李别駕壁去鄕不逺逢知已握手相歡得如此禮樂遥傳魯伯禽賓客爭過魏公子酒筵莫散明月上櫪馬常鳴春風起一生稱意能㡬人今日從君問終始邯鄲少年行邯鄲城南㳺俠子自矜生長邯鄲裏千塲縱博家仍冨㡬處報讎身不死宅中歌􅀏日紛紛門外車馬如雲屯未知肝膽向誰是令人􅁍憶平原君君不見今人交態薄黃金用盡還踈索以兹感歎辭􅃇逰更於時事無所求且與少年飲美酒徃來射獵西山頭古大梁行古城莾蒼饒荆榛驅馬荒城愁殺人魏王宫觀盡禾􅁰信陵賓客隨􅁅塵憶昨雄都舊朝市軒車照耀歌鍾起軍容帯甲三十萬國歩連營五千里全盛須􅁷那可論高䑓曲池無復存遺墟但見狐狸迹古地空餘草木根暮天摇落傷懷抱撫劒悲歌對秋草俠客猶傳朱亥名行人尚識夷門道白璧黄金萬戶侯寳刀駿馬填山丘年代淒涼不可問徃來唯見水東流別楊山人不到嵩陽動十年舊時心事已徒然一二故人不復見三十六峯猶眼前夷門二月桞條色流鶯數聲淚沾臆鑿井耕田不我招知君以此忘帝力山人好去嵩陽路惟余眷眷長相憶送田少府貶蒼梧沉吟對遷客惆悵西南天昔爲一官未得意今向萬里令人憐念兹斗酒成睽間停舟嘆君日將晏逺樹應憐北地春行人􅁍羡南歸鴈丈夫窮逹未可知看君不合長數奇江山到處堪乗興楊桞青青那足悲别李景參離心忽悵然策馬對秋天孟諸薄暮涼風起歸客相逢渡睢水昨時携手已十年今日分途各千里􅀊物蕭條滿路􅄮此行浩蕩令人悲家貧羡爾有微禄欲徃從之何所之送郭處士徃莱蕪兼􅀉苟山人君爲東􅀩客徃來東􅀩畔雲卧臨嶧陽山行窮日觀少年詞賦皆可聽秀眉白靣風清泠身上未曽染名利口中猶未知膻腥今日還山意無極豈辭世路多相識歸見萊蕪九十翁為論别後長相憶同李九士曹觀壁畫雲作始知帝鄉客能畫蒼梧雲秋天萬里一片色只疑飛盡猶氛氲送别昨夜離心正鬰陶三更白露西風髙螢飛木落何浙瀝此時夢見西歸客曙鍾寥亮三四聲東隣嘶馬使人驚􅄃衣出戸一相送唯見歸雲縱復橫崔司錄宅燕大理李卿多雨殊未巳秋雲更沉沉洛陽故人初解印山東小吏來相㝷上卿才大名不朽早朝至尊莫求友豁逹常推海内賢殷勤但酌樽中酒飲醉欲言歸門前駟馬光照衣路傍觀者徒唧唧我公不以爲是非畫馬篇君侯櫪上􅍡貌在丹青中馬毛連錢蹄鐡色圖畫光輝驕玉勒馬行不動􅀔若來權奇蹴􅂿無塵埃感兹絶代稱妙手遂令談者不容口麒麟獨歩自可珎駑駘萬疋知何有終未如他櫪上􅍡載華轂騁飛鴻荷君剪拂與君用一日千里如旋風詠馬鞭龍竹飬根凡㡬年工人截之爲長鞭一節一目皆天然珠重重星連連繞指柔純金堅繩不􅀡規不圓把向空中捎一聲良馬有心日馳千贈别晉三處士有人家住清河源渡河問我逰梁園手持道經注已畢心知内篇口不言盧門拾年見秋草此心惆悵誰能道知已從來不易知慕君爲人與君好别時九月桑葉踈出門千里無行車愛君且欲君先逹今上求賢早上書九月九日酬顔少府簷前白日應可惜籬下黃花爲誰有行子迎霜未授衣主人得錢始沽酒蘇秦顦顇人多厭蔡澤棲遲世看醜縱使登高只斷腸不如獨坐空搔首賦得還山吟送沈四山人還山吟天高日暮寒山深送君還山識君心人生老大須恣意看君解作一生事山間偃仰無不至石泉淙淙􅀂風雨桂花松子常滿地賣藥囊中應有錢還山服藥又長年白雲勸盡杯中物明月相隨何處眠眠時憶問醒時意夢魂可以相周旋見人臂蒼鷹寒楚十二月蒼鷹八九毛寄言燕雀莫相忌自有雲霄萬里高古歌行君不見漢家三葉從代至高皇舊臣多冨貴天子垂衣方晏如廟堂拱手無餘議蒼生偃卧休征戰露䑓百金以爲費田舍老翁不出門洛陽少年莫論事同鮮于洛陽於畢貟外宅觀畫馬歌知君愛鳴琴仍好千里馬永日恒思單父中有時心到宛城下遇客丹青天下才白生胡雛控龍媒主人娯賓畫障開只言騏驥西極來半壁䟃􅑗􅀔不往滿堂風飄颯然度家僮愕視欲先鞭櫪馬驚嘶還屢顧始知物妙皆可憐燕昭市駿豈徒然縱令翦拂無所用猶勝駑駘在眼前送渾將軍出塞將軍族貴兵且強漢家已是渾耶王子孫相承在朝野至今部曲燕支下控弦盡用隂山兒登陣常騎大宛馬銀鞍玉勒繡蝥弧每逐嫖姚破骨都李廣從來先將士衞青未肯學孫呉傳有沙場千萬􅀐昨日邊庭羽書至城頭畫角三四聲匣裏寳刀晝夜鳴意氣能甘萬里去􅉝勤動作一年行黃雲白草無前後朝建旌旗夕刁斗塞下應多俠少年􅀜西不見春楊桞從軍借問所從誰擊劒酣歌當此時逺别無輕繞朝策平戎早􅀉仲宣詩同河南李少尹畢員外宅夜飲時洛陽告捷遂作春酒歌故人美酒勝濁醪故人清詞合風騷長歌滿酌惟吾曹高談正可揮麈毛半醉忽然持蟹螯洛陽告捷傾前後武侯腰間印如斗郎官無事時飲酒杯中緑蟻吹轉來甕上飛花拂還有前年持節將楚兵去年􅅏司在東京今年復拜二千石盛夏五月西南行彭門劒門蜀山裏昨逢軍人刼奪我到家但見妻與子頼得飲君春酒數十杯不然令我愁欲死􅀉宿田家田家老翁住東陂􅀃道平生隱在茲鬂白未曽記日月山青每到識春時門前種柳深成巷野谷流泉添入池牛壯日耕十畒地人閑常掃一茆茨客來滿酌清樽酒感興平吟才子詩巖際窟中藏鼹䑕潭􅁁竹裏隱鸕鷀村墟日落行人少醉後無心怯路􅄮今夜只應還􅀉宿明朝拂曙與君辭人日􅀉杜二拾遺人日題詩寄草堂遥憐故人思故鄕柳條弄色不忍見梅花滿枝空斷膓身在南蕃無所預心懷百憂復千慮今年人日空相憶明年人日知何處一卧東山三十春豈知書劒老風塵龍鍾還忝二千石愧爾東西南北人塞下曲君不見芳􅀣枝春花落盡蜂不窺君不見梁上泥秋風始高燕不栖蕩子從軍事征戰蛾眉蟬姢守空閨獨宿自然堪下淚况復時聞鳥夜啼高常侍集卷第五高常侍集卷第六五言律詩武威同諸公過楊七山人幕府日多暇田家􅀊復登相知恨不早乗興乃無恒窮巷在喬木深齋垂古藤􅁁城唯有醉此外更何能入昌松東界山行鳥道㡬登頓馬蹄無暫閒﨑嶇出長坂合沓猶前山石激水流處天寒松色間王程應未盡且莫顧刀鐶送白少府送兵之隴右殘更豋隴首逺别指臨洮爲問關中事何如州縣勞軍容隨赤羽􅀣色引青􅂁誰斷單于臂今年太白高河西送李十七􅁁城多逺别此去莫徒然問禮知才子豋科及少年出門看落日驅馬向秋天高價人争重行當早着鞭醉後贈張九旭世上謾相識此翁殊不然興來書自聖醉後語猶顚白髮老閑事青雲在目前􅇃頭一壼酒能更㡬回眠酬衛八雪中見寄季冬憶淇上落日歸山樊舊宅帯流水平田臨古村雪中望来信醉裏開衡門果得希代寳緘之那可論同魏八題陸少府書齋知君薄州縣好靜無冬春散帙至棲鳥明燈留故人深房臘酒熟髙院梅花新若是周旋地當令風義親送張瑶貶五溪尉他日維貞幹明時懸鏌鎁江山遥去國妻子獨還家離别無嫌逺沉浮勿強嗟南登有詞賦知爾弔長沙别韋五徒然酌杯酒不覺散人愁相識仍逺别欲歸翻旅逰夏雲滿郊甸明月照河洲莫恨征途逺東看漳水流别劉大校書昔日亰華去知君才望新應猶作賦好莫嘆在官貧且復傷逺别不然愁此身清風㡬萬里江上一歸人宋中别司功叔各賦一物商丘試一望􅀮隱帯秋天地與星辰在城將大路遷干戈悲昔事墟落對窮年即此傷離緒淒淒賦酒筵送蔡十二之海上黯然何所爲相對益悲酸季弟念離别賢兄救急難河流冰處盡海路雪中寒尚有南飛鴈知君不忍看宴郭校書因之有别綵服趨庭訓分交載酒過芸香早著蓬轉事仍多苦戰知機息窮愁柰别何雲霄莫相待年􅁂巳蹉跎别韋兵曹離别長千里相逢數十年此心應不變他事巳徒然惆悵春光裏蹉跎桞色前逢時當自取有爾欲先鞭獨􅀌判官部送兵餞君嗟逺别爲客念周旋征路今如此前軍猶眇然出􅀜逢漢壁登隴望胡天亦是封侯地期君早着鞭别從甥萬盈諸生曰萬盈四十乃知名宅相予偏重家丘人莫輕美才應自料苦節豈無成莫以山田薄今春又不耕别崔少府知君少得意汶上掩柴扉寒食仍􅅏火春風未授衣皆言黃綬屈早向青雲飛借問他鄉事今年歸不歸别馮判官碣石遼西地漁陽薊北天􅀜山唯一道雨雪盡三􅁁才子方爲客將軍正慕賢遥知幕府下書記日翩翩同李太守北池泛舟宴髙平鄭太守毎揖龔黄事還陪李郭舟雲從四岳去水向百城流幽意隨登陟嘉言即獻酬乃知縫掖貴今日對諸侯同崔貟外綦母拾遺九日宴京兆府李士曹今日好相見群賢仍廢曹晚晴催翰墨秋興引風騷絳葉擁虚砌黃花隨濁醪閉門無不可何事更登高送崔功曹赴越傳有東南别題詩報客居江山知不厭州縣復何如莫恨呉歈曲當看越絶書今朝欲乗興随爾食鱸魚送蹇秀才赴臨洮悵望日千里如何今二毛猶思陽谷去莫厭隴山高倚馬見雄筆隨身唯寳刀料君終自致勲業在臨洮淇上别業依依西山下别業桑林􅁁庭鴨喜多雨隣鷄知暮天野人種秋菜古老開原田且向世情逺吾今聊自然淇上送韋司倉徃滑臺飲酒莫辭醉醉多適不愁孰知非逺别終念對窮秋滑䑓門外見淇水眼前流君去應回首風波滿渡頭使青夷軍入居庸三首匹馬行將久征途去轉難不知􅁁地别秪訝客衣單溪冷泉聲苦山空木葉乾莫言􅀜塞極雲雪尚漫漫古鎮青山口寒風落日時巖巒鳥不過氷雪馬堪遲出塞應無策還家頼有期東山足松桂歸去結茅茨登頓驅征騎棲遲愧寶刀逺行今若此微禄果徒勞絶坂水連下群峯雲共高自堪成白首何事一青袍自薊北歸驅馬薊門北北風􅁁馬哀蒼茫逺山口豁逹朝天開五􅀅巳深入前軍止半廻誰憐不得意長劍獨歸來途中􅀉徐録事落日風雨至秋天鴻鴈􅀄離憂不堪比旅館復何如君又㡬時去我知音信踈空多篋中贈長見右軍書廣陵别鄭處士落日知分手春風莫斷膓興來無不愜才在亦何傷溪水堪垂釣江田耐插秧人生只爲此亦足傲羲皇别孫訢離人去復􅅏白馬黒貂裘屈指論前事停鞭惜舊逰帝鄕那可忘旅館日堪愁誰念無知已年年睢水流送劉評事充朔方判官賦得征馬嘶征馬向邊州蕭蕭嘶不休思深應帯别聲斷為兼秋岐路風將逺􅀜山月共愁贈君從此去何日大刀頭送魏八更沽淇上酒還泛驛前舟爲惜故人去復憐嘶馬愁雲山行處合風雨興中秋北路無知巳明珠莫暗投贈别禇山人携手贈將行山人道姓名光隂薊子訓才術禇先生墻上梨花白樽中桂酒清洛陽無二價猶是慕風聲别王八征馬嘶長路離人挹佩刀客來東道逺歸去北風高時候何蕭索郷心正鬱陶傳君遇知巳行日有綈􅂁送董判官逢君􅀃行邁倚劍别交親幙府爲才子將軍作主人近􅀜多雨雪出塞有風塵長策須當用男兒莫顧身同群公登濮陽聖佛寺閣落日登臨處悠然意不窮佛因􅀄地識人覺四天空來鴈清霜後孤㠶逺􅀣中徘徊傷寓目蕭索對寒風同群公十月朝宴李太守宅良牧徴高賞褰帷問考槃􅀊時當正月甲子入初寒巳聽甘棠頌欣陪㫖酒歡仍憐門下客不作布衣看送裴別將之安西絶域􅆌難躋悠然信馬蹄風塵驚䟦渉搖落怨睽携地出流沙外天長甲子西少年無不可行矣莫悽悽部落曲蕃軍傍塞逰代馬噴風秋老將垂金甲閼支着錦裘琱戈􅀩豹尾紅斾揷狼頭日暮天山下鳴笳漢使愁送鄭侍御謫閩中謫去君無恨閩中我舊過大都秋鴈少只是夜猿多東路雲山合南天瘴癘和自當逢雨露行矣慎風波送李侍御赴安西行子對飛蓬金鞭指鐡騘功名萬里外心事一杯中虜障燕支北秦城太白東離魂莫惆悵看取寳刀雄贈杜二拾遺傳道招提客詩書自討論佛香時入院僧飯屢過門聽法還應難㝷經剰欲翻草玄今巳畢此外復何言高常侍集卷第六髙常侍集卷第七五言排律秋日作端居值秋節此日更愁辛􅄫寞無一事蒿莱通四鄰閉門生白髪廻首憶青春歳月不相待交逰隨衆人雲霄何處託愚􅀡有誰親舉酒聊自勸窮通信爾身陪竇侍御泛靈雲池白露時先降清川思不窮江湖仍塞上舟楫在軍中舞換臨津樹歌饒向晚風夕陽連積水􅁁色滿秋空乗興宜投轄邀歡莫避騘誰憐持弱羽猶欲伴鵷鴻陪竇侍御靈雲南亭宴詩并序涼州近胡高下其池亭蓋以耀蕃落也幕府董帥雄勇徑踐戎庭自陽關而西猶枕席矣軍中無事君子飲食宴樂宜哉白簡在􅁁清秋多興况水具舟檝山兼亭䑓始臨泛而冩煩俄登陟以􅀉傲絲桐徐奏林木更爽觴蒲萄以逓歡指蘭􅊉而可掇胡天一望雲物蒼然雨蕭蕭而牧馬聲斷風嫋嫋而邉歌㡬處又足悲矣員外李公曰七日者何牛女之夕也夫賢者何得謹其時請賦南亭詩列之于後人幽宜眺聽目極喜亭臺風景知愁在􅀜山憶夢廻秪言殊語黙何意忝逰陪連唱波瀾動􅄀搜物象開新秋歸逺􅀣􅋊雨擁輕雷簷外長天盡尊前獨鳥來常吟塞下曲多謝幙中才河漢徒相望嘉期安在哉和竇侍御豋凉州七級浮圖之作化塔圪中起孤高宜上躋鐡冠雄賞眺金界寵招擕空色在軒戸􅁁聲連鼓鼙天寒萬里北地豁九州西清興揖才彦峻風和端倪始知陽春後具物皆筌蹄同熊少府題盧主簿茅齋虚院野情在茅齋秋興存孝㢘趍下位才子出高門乃繼幽人靜能令學者尊江山歸謝客神􅀑下劉根階樹時攀折窓書任討論自堪成獨徃何必武陵源同朱五題盧使君義井髙義唯良牧深仁自下車寜知鑿井處還是飲氷餘地即泉源乆人當汲引初體清能鑒物色洞每含虚上善滋來徃中和浹里閭濟時應未竭懷惠復何如同郭十題楊主簿新廳華館曙沉沉惟良正在今用材兼柱石開物象高深更得芝蘭地兼榮枳􅁄林向風扄㦸戸當署近棠隂勿改安卑節聊閑理􅇵心多君有知巳一和郢中吟送蔡少府赴登州推事膠東連即墨莱水入滄溟國小常多事人訛屢抵刑公才徴郡邑詔使出郊坰標格誰當犯風謡信可聽峥嶸大峴口邐迤汶陽亭地逈雲偏白天秋山更青祖筵方卜晝王事急侵星勸爾將爲德斯言蓋有聽}
