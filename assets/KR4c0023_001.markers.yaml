  - {type: line-break, offset: 0, content: '', id: KR4c0023_WYG_001-1a01}
  - {type: variant, offset: 0, length: 432, content: 欽定四庫全書高常侍集巻一唐髙適撰詩燕歌行并序開元二十六年客有從元戎岀塞而還者作燕歌行以示適感征戍之事因而和焉漢家煙塵在東北漢將辭家破殘賊男兒本自重横行天子非常賜顔色摐金伐鼓下榆關旌斾逶迤碣石間校尉羽書飛瀚海單于獵火照狼山山川蕭條極邉土胡騎慿陵雜風雨戰士軍前半死生美人帳下猶歌舞大漠窮秋塞草腓孤城落日鬬兵稀身當恩遇常輕敵力盡闗山未解圍鐵衣遠戍辛勤乆玉筯應啼别離後少婦城南欲斷腸征人薊北空迴首邉庭飄颻那可度絶域蒼茫無所有殺氣三時作陣雲寒聲一夜傳刁斗相看白刃血紛紛死節從来豈顧勲君不見沙塲征戰苦至今猶憶李將軍行路難二首君不見富家翁舊時貧賤誰比數一朝金多結豪貴百事勝人健如虎子孫成行一作長滿眼前妻能管絃妾歌舞自矜一身忽如此却笑傍人獨愁苦東鄰少年安所如席門窮巷出無車有才不肯學干謁何用年年空讀書長安少年不少錢能騎駿馬鳴金鞭五侯相逢大道邉美人絃管争留連黄金如斗不敢惜片言如山莫棄捐安知顦顇讀書者暮宿靈臺私自憐宋中十首梁王昔全盛賔客復多才悠悠一千年陳跡惟高臺寂寞向秋草悲風千里来, SBCK: ''}
