  - {type: variant, offset: 1417, length: 245, content: 别韋參軍二十解書劍西游長安城舉頭望君門屈指取公卿國風沖融邁三五朝廷歡樂彌寰宇白璧皆言賜近臣布衣不得干眀主歸来洛陽無負郭東過梁宋非吾土兎苑為農嵗不登鴈池垂釣心常苦世人向我同衆人唯君於我最相親且喜百年有交態未嘗一日辭家貧弹棊擊筑白日晚縱酒髙歌楊栁春歡娛未盡分散去使我惆悵驚心神丈夫一作終當不作兒女别臨歧涕淚霑衣巾送蔡山人東山布衣眀古今自言獨未逢知音識者閱見一生事到處豁然千里心看書學劍長辛苦近日方思謁眀主斗酒相留醉復醒悲歌數年淚如雨丈夫遭遇不可知買臣主父皆如斯我今蹭蹬無所似看爾崩騰何一作更若為, SBCK: ''}
