  - {type: line-break, offset: 0, content: '', id: KR4c0023_WYG_006-1a01}
  - {type: variant, offset: 0, length: 471, content: 欽定四庫全書髙常侍集卷六唐髙適撰詩信安王幕府詩并序開元二十年國家有事林胡詔禮部尚書信安王總戎大舉時考功郎中王公司勲郎中劉公主客郎中魏公侍御史李公監察御史崔公咸在幕府詩以頌美數公見於詞凡三十韻雲紀軒皇代星髙太白年廟堂咨上䇿幕府制中權盤石藩維固昇壇禮樂先國章榮印綬公服貴貂蟬樂善旌深徳輸忠格上𤣥剪桐光寵錫題劍美貞堅聖祚雄圖廣師貞武徳䖍雷霆七校發旌斾五營連華省徴羣又霜臺舉二賢豈伊公望逺曾是茂才遷並秉韜鈐術兼該翰墨筵帝思麟閣像臣獻栢梁篇振玉登遼甸摐金歴薊壖度河飛羽檄横海泛樓船北伐聲逾邁東征務以專講戎喧涿野料敵靜居延軍勢持三畧兵戎自九天朝瞻授鉞去時聽偃戈旋大漠風沙裏長城雨雪邊雲端臨碣石波際隠朝鮮夜壁冲髙斗寒空駐綵旃倚弓𤣥兎月飲馬白狼川庶物隨交泰蒼生解倒懸四郊增氣象萬里絶風煙闗寒鴻勲著京華甲第全落梅横吹後春色凱歌前直道常兼濟微才獨棄捐曵裾誠已矣投筆尚悽然作賦同元淑能詩匪仲宣雲霄不可望空欲仰神仙奉詶睢陽李太守公族稱王佐朝經允帝求本枝彊我李磐石冠諸劉禮樂光輝盛山河氣象幽系髙周柱史名重晉陽秋華省膺推擇青雲寵宴遊握蘭多具美前席有嘉謀賦得黄金賜言皆白璧, SBCK: ''}
