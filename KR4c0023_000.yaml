body:
  text: 高常侍集目録别集類一唐巻一詩一巻二詩二巻三詩三巻四詩四巻五詩五巻六詩六巻七詩七巻八詩八巻九雜著巻十表臣等謹按髙常侍集十巻唐髙適撰適字達夫唐書作渤海人其集亦題曰渤海河間府志據其封丘縣詩我本漁樵孟諸野句又初至封丘詩有去家百里不得歸句定為梁宋間人而集中别孫沂詩題下又註時俱客宋中則又似非生於梁宋者考唐代士人多題其郡望史傳亦復因之往往失其里籍劉知㡬作史通極言其弊而終不能更適籍既無定辭則亦闕疑可也適集唐志十巻通考又有集外文一巻詩一巻此本從宋本影鈔内廓字闕筆避寧宗嫌名當為慶元以後之本凡詩八巻文二巻其集外詩文則無之考明人所刻適集以太平廣記髙鍇侍郎墓中狐妖絶句所謂危冠髙髻楚宫粧閒步前庭趂夜涼自把玉簮敲砌竹清歌一曲月如霜者併載入之蕪襍殊甚又九日一詩見宋程俱北山集毛竒齡選唐人七律亦誤題適作此本不載較他本特為精審第十巻中有賀安禄山死表稱臣得河南道及諸州牒皆言逆賊安禄山苦痛而死手足俱落眼鼻殘壞則禄山竟以病死與史載李猪兒事迥異葢兵戈雲擾得諸傳聞不能盡確固未可據以訂史耳乾隆四十一年十一月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀
