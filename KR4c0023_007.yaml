body:
  text: 髙常侍集卷七唐髙適撰詩酬祕書弟兼寄幕下諸公并序乙亥歲適徴詣長安時侍御楊公任通事舍人詩書起豫蓋終日矣今年適自封丘尉統吏卒於青夷途經博陵得太守賈公之政相見如舊他日之意存焉司業張侯周旋逮兹近三十載將疇昔是好匪窮逹之異乎族弟祕書㕐序之白眉者風塵一别俱東西南北之人愴然相逢適與願契旅館之暇長懷益增因賦是詩愧非六義之流也亞相膺時傑羣才遇良工翩翩幕下來拜賜甘泉宫信知命世竒適㑹非常功侍御執邦憲清詞煥春叢末路望繡衣他時常發䝉孰云三軍壯懼我彈射雄誰謂萬里遙在我樽俎中光祿經濟器精微自深𠂻前席屢榮問長城兼在躬髙蹤激頽波逸翮馳蒼穹將副節制籌欲令沙漠空司業至應徐雅度思冲融相思三十年憶昨猶兒童今來抱青紫忽若披鵷鴻說劍增慷慨論交持始終祕書即吾門虛白無不通多才陸平原碩學鄭司農獻封到關西獨步歸山東永意久知處嘉言能亢宗客從梁宋來行投隨轉蓬酬贈欣元弟憶賢瞻數公游鱗戲滄浪鳴鳯棲梧桐並負垂天翼俱乘破浪風耽耽天府間偃仰誰敢同何意搆廣厦翻然顧雕蟲應知阮步兵惆悵此途窮淇上酬薛三掾兼寄郭少府自從别京華我心乃蕭索十年守章句萬事空寥落北上登薊門茫茫見沙漠倚劍對風塵慨然思衛霍拂衣去燕趙驅馬悵不樂天長滄洲路日暮邯鄲郭酒肆或淹留漁潭屢棲泊獨行備艱險所見一作覩窮善惡永願拯一作極芻蕘孰云干鼎鑊皇情念淳古時俗何浮薄理道資任賢安人在求瘼故交負靈竒逸氣抱蹇諤隱軫經濟具縱橫建安作才望忽先鳴風期無宿諾飄颻勞州縣迢遞限言謔東馳眇貝丘西顧彌虢略淇水徒自流浮雲不堪託吾謀適可用天路豈寥廓不然買山田一身與耕鑿且欲同鷦鷯焉能志鴻鶴酬岑二十主簿秋夜見贈之作舍下蛩亂鳴居然自蕭索緬懷髙秋興忽枉清夜作感物我心勞凉風驚二毛池空菡蓞死月出梧桐髙如何異鄉縣復得交才彥汩沒嗟後時蹉跎恥相見箕山别來久魏闕誰不戀獨有江海心悠然未嘗倦苦雪四首二月猶北風天隂雪冥冥寥落一室中悵然慙百齡苦愁正如此門栁復青青惠連發清興袁安念髙卧余故非斯人為性兼懶惰賴兹樽中酒終日聊自過濛濛灑平陸淅瀝至幽居且喜潤羣物焉能悲斗儲故交久不見鳥雀投吾廬孰云久間曠本自保知寡窮巷獨無成春條祗盈把安能羡鵬舉且欲歌牛下乃知古時人亦有如我者登廣陵棲靈寺塔淮南冨登臨兹塔信竒最直上造雲族馮虛納天籟迥然碧海西獨立飛鳥外始知髙興盡適與賞心㑹連山黯吳門喬木吞楚塞城池滿窗下物象歸掌內逺思駐江帆暮情結春藹軒車疑蠢動造化資大塊何必了無身然後知所退魯郡途中遇徐十八録事時此公學王書嗟别誰謂嵩潁客遂經鄒魯鄉前臨少昊墟始覺東䝉長獨行豈吾心懷古激中腸聖人久已矣遊夏遙相望徘徊野澤間左右多悲傷日出見闕里川平知汾陽弱冠負髙節十年思自强終然不得意去去任行藏酬鴻臚裴主簿雨後睢陽北樓見贈之作暮霞照新晴歸雲猶相逐有懷晨昏暇想見登眺目問禮侍彤襜題詩訪茅屋髙樓多古今陳事滿陵谷地久微子封臺餘孝王築徘徊顧霄漢豁逹俯川陸逺水對秋城長天向喬木公門何清淨列㦸森以肅不歎攜手稀恆思著鞭速終當拂羽翰輕舉隨鴻鵠薊門五首邊城十一月雨雪亂霏霏元戎號令嚴人馬亦輕肥羌胡無盡日征戰幾時歸幽州多騎射結髮重橫行一朝事將軍出入有聲名紛紛獵秋草相向角弓鳴薊門逢故老獨立思氛氲一身既零丁頭鬢白紛紛勳庸今已矣不識霍將軍黯黯長城外日沒更煙塵胡騎雖慿陵漢兵不顧身古樹滿空塞黃雲愁殺人漢家能用武開拓窮異域戍卒厭糟糠降胡飽一作重衣食關亭試一望吾欲淚沾臆送李少府貶峽中王少府貶長沙嗟君此別意何如駐馬銜杯問謫居巫峽啼猿數行淚衡陽歸㕐幾封書青楓江上秋天逺白帝城邊古木疏聖代即今多雨露暫時分手莫躊躇古歌行君不見漢家三葉從代至髙皇舊臣多冨貴天子垂衣方晏如廟堂拱手無餘議蒼生偃卧休征戰露臺百金以為費田舍老翁不出門洛陽少年莫論事同羣公登濮陽聖佛寺閣落日登臨處悠然意不窮佛因初地識人覺四天空來㕐清霜後孤帆逺樹中徘徊傷寓目蕭索對寒風同羣公十月朝宴李太守宅得寒字良牧徴髙賞褰帷問考槃嵗時當正月甲子入初寒已聽甘棠頌欣陪旨酒歡仍憐門下客不作布衣看同羣公宿開善寺陳十六所居駕車出人境避暑投僧家徘徊龍象側始見香林花讀書不及經飲酒不勝茶知君悟此道所未披袈裟談空忘外物持戒破諸邪則是無心地相看惟月華同羣公秋登琴臺古跡使人感琴臺空寂寥靜然顧遺塵千載如昨朝臨眺自兹始羣賢久相邀德與形神髙孰知天地遙四時何倐忽六月鳴秋蜩萬象歸白帝平川橫赤霄猶是對夏伏幾時有凉飈燕雀滿簷楹鴻鵠摶扶搖物性各自得我心在漁樵兀然還復醉尚握樽中瓢同羣公題張處士菜園耕地桑柘間地肥菜常熟為問葵藿資何如廟堂肉同羣公出獵海上畋獵自古昔況伊心賞俱偶與羣公逰曠然出平蕪層隂漲溟海殺氣窮幽都鷹隼何翩翩馳驟相傳呼豺狼竄榛莽麋鹿罹艱虞髙鳥下騂弓困獸鬬匹夫塵驚大澤晦火燎深林枯失之有餘恨獲者無全軀咄彼工拙間恨非指蹤徒猶懷老氏訓感歎此歡娛同羣公題鄭少府田家此公昔任白馬尉今寄住滑臺鄭侯應栖惶五十頭盡白昔為南昌尉今作東郡客與語多逺情論心知所益秋林既清曠窮巷空淅瀝蝶舞園更間雞鳴日云夕男兒未稱意其道固無適勸君且杜門勿歎人事隔同羣公題中山寺平原十里外稍稍雲巖深遂及清淨所都無人世心名僧既禮謁髙閣復登臨石壁倚松徑山田多栗林超遙盡巘崿逼側仍嶇􅋂吾欲休世事於焉聊自任高常侍集卷七
