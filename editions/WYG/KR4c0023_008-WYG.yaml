  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR4c0023_WYG_008-1a, image: WYG1071/WYG1071-0409c.png}
body:
  text: 髙常侍集巻八唐髙適撰詩李雲南征蠻詩并序天寶十一載有詔伐西南夷右相楊公兼節制之寄乃奏前雲南太守李宓涉海自交趾擊之道路險艱徃復數萬里蓋百王所未通也十二載四月至於長安君子是以知廟堂使能而李公効節適忝斯人之舊因賦是詩聖人赫斯怒詔伐西南戎肅穆廟堂上深沉節制雄遂令感激士得建非常功料死不料敵顧恩寜顧終鼓行天海外轉戰蠻夷中梯巘近髙鳥穿林經毒蟲鬼門無歸客北户多南風蜂蠆隔萬里雲雷隨九攻長驅大浪破急擊羣山空餉道忽已逺懸軍垂欲窮精誠動白日憤薄連蒼穹野食掘田䑕晡飱兼􅈎僮收兵列亭堠拓地彌西東臨事恥茍免履危能飭躬将星獨照耀邊色何溟濛瀘水夜可渉交州今始通歸来長安道召見甘泉宫㢘藺若未死孫呉知暗同相逢論意氣慷慨謝深𠂻登百丈峯二首朝登百丈峯遙望燕支道漢壘青冥間胡天白如掃憶昔霍将軍連年此征討匈奴終不滅寒山一作塞下徒草草唯見鴻㕐飛令人傷懐抱晉武輕後事惠皇終巳昏豺狼塞瀍洛羌羯爭乾坤四海如鼎沸五原徒自尊而今白庭路猶對青陽門朝市不足問君臣隨草根同李員外賀哥舒大夫破九曲之作遙傳副承相昨日破西蕃作氣羣山動揚軍大旆翻竒兵邀轉戰連弩絶歸奔泉噴諸戎血風驅死虜魂頭飛攅萬㦸靣縛聚轅門鬼哭黄埃暮天愁白日昏石城與巖險鐵騎皆雲屯長策一言决髙蹤百代存威稜懾沙漠忠義感乾坤老將黯無色儒生安敢論解圍慿廟筭止殺報君恩唯有關河渺蒼茫空樹墩送裴别將之安西絶域𣺌難躋悠然信馬蹄風塵驚跋涉揺落怨睽攜地出流沙外天長甲子西少年無不可行矣莫悽悽送鄭侍御謫閩中謫去君無恨閩中我舊過大都秋㕐少只是夜猿多東路雲山合南天瘴癘和自當逢雨露行矣慎風波送李侍御赴安西行子對飛蓬金鞭指鐡驄功名萬里外心事一杯中虜障燕支北秦城太白東離魂莫惆悵看取寶刀雄詶河南節度使賀蘭大夫見贈之作時在揚州髙閣慿欄檻中軍倚旆旌感時常激切於已即忘情河華屯妖氣伊瀍有戰聲媿無戡難策多謝出師名秉鉞知恩重臨戎覺命輕股肱瞻列岳唇齒賴長城隠隠摧鋒勢光光弄印榮魯連真義士陸遜豈書生直道寜殊智先鞭忽抗行楚雲隨去馬淮月尚連營撫劍堪投分悲歌益不平從来重然諾況值欲横行同鮮于洛陽於畢貟外宅觀畫馬歌知君愛鳴琴仍好千里馬永日恒思單父中有時心到宛城下遇客丹青天下才白生胡雛控龍媒主人娯賔畫障開只言騏驥西極来半壁䟃􅑗勢不住滿堂風飄颯然度家僮愕視欲先鞭􅇫馬驚嘶還屢顧始知物妙皆可憐燕昭市駿豈徒然縱令翦拂無所用猶勝駑駘在眼前赴彭州山行之作峭壁連崆峒攅峯疊翠微鳥聲堪駐馬林色可忘機怪石時侵徑輕蘿乍拂衣路長愁作客年老更思歸且恱巖巒勝寕嗟意緒違山行應未盡誰與玩芳菲詶裴貟外以詩代書凡三百四十六字少時方浩蕩遇物猶塵埃脫略身外事交遊天下才單車入燕趙獨立心悠哉寜知戎馬間忽展平生懷且欣清論髙豈顧夕陽頺題詩碣石館縱酒燕王臺北望沙漠垂漫天雪皚皚臨邉無策略覽古空徘徊樂毅吾所憐拔齊飜見猜荆卿吾所悲適秦不復迴然諾多死地公忠成禍胎與君從此辭每恐流年催如何俱老大始復忘形骸兄弟真二陸聲華連八裴乙未將星變賊臣候天災胡騎犯龍山乘輿經馬嵬千官無倚着萬姓徒悲哀誅吕鬼神動安劉天地開奔波走風塵倐忽值雲雷擁旄出淮甸入幕徴楚材誓當翦鯨鯢永以竭駑駘小人胡不仁讒我成死灰賴得日月明照耀無不該留司洛陽宫詹府唯蒿萊是時掃氛祲尚未殱渠魁背河列長圍師老將亦乖歸軍劇風火散卒爭椎埋一夕瀍洛空生靈悲曝腮衣冠投草莽子欲馳江淮登頓宛葉下栖遑襄鄧隈城池何蕭條邑屋更崩摧縱横荆棘叢但見瓦礫堆行人無血色戰骨多青苔遂除彭門守因得朝玉階激昻仰鴛鷺獻替忻塩梅驅傳及逺蕃憂思鬱難排罷人紛爭訟賦稅如山崖所思在畿甸曾是魯宓儕自從拜郎官列宿煥天街那能訪遐僻還復寄瓊瓌金玉本高價塤箎終易諧朗詠臨清秋凉風下庭槐何意冦盜間獨稱名義偕辛酸陳侯誄陳二補闕銘誄即裴所為歎惜季鷹杯白日屢分手青春不再來卧看中散論愁憶太常齋酬贈徒為爾長歌還自咍送渾將軍出塞将軍族貴兵且强漢家已是渾邪王子孫相承在朝野至今部曲燕支下控弦盡用隂山兒登一作臨陣常騎大宛馬銀鞍玉勒繡蝥弧每逐嫖姚破骨都李廣從来先將士衛青未肯學孫呉傳有沙塲千萬騎昨日邉庭羽書至城頭畫角三四聲匣裏寳刀晝夜鳴意氣能甘萬里去辛勤動一作判作一年行黄雲白草無前後朝建旌旗夕刁斗塞下應多俠少年關西不見春楊栁從軍借問所從誰擊劍酣歌當此時逺別無輕繞朝策平戎早寄仲宣詩九曲詞三首鐵騎横行鐡嶺頭西看邏逤取封侯青海只今将飲馬黄河不用更防秋許國從来徹廟堂連年不為在壇場将軍天上封侯印御史臺中異姓王萬騎爭歌楊栁春千塲對舞繡騏驎到處盡逢歡洽事相看揔是太平人同河南李七少尹畢貟外宅夜飲時洛陽告捷遂作春酒歌故人美酒勝濁醪故人清詞合風騷長歌滿酌唯吾曹髙談正可揮塵毛半醉忽然持蟹螯洛陽告捷傾前後武侯腰間印如斗郎官無事時飲酒杯中緑蟻吹轉来瓮上飛花拂還有前年持節将楚兵去年留司在東京今年復拜二千石盛夏五月西南行彭門劍門蜀山裏昨逢軍人刼奪我到家但見妻與子賴得飲君春酒數十巵不然令我愁欲死寄宿田家田家老翁住東陂說道平生隠在兹鬢白未曾記日月山青每到識春時門前種栁深成巷野谷流泉添入池牛壮日耕十畝地人閑常掃一茅茨客来滿酌清罇酒感興平吟才子詩巖際窟中蔵鼹䑕潭邉竹裏隠鸕鷀村稀日落行人少醉後無心怯路岐今夜只應還寄宿明朝拂曙與君辭東平旅遊奉贈薛太守二十四韻頌美馳千古欽賢仰大猷晉公標逸氣汾水注長流神與公忠節天生將相儔青雲本自負赤縣獨推尤御史風逾勁郎官草屢脩鴛鸞粉署起鷹隼栢臺秋出入交三事飛鳴揖五侯軍書陳上策廷議借前籌肅肅趨朝列雝雝引帝求一麾俄出守千里再分憂不改任棠水仍傳晏子裘歌謠隨舉扇旌斾逐鳴騶郡國長河遶川原大野幽地連堯泰岳山向禹青州汶上春㠶渡秦亭晚日愁遺墟當少昊懸象逼奎婁即此逢清鑒終然喜暗投叨承解榻禮更得問縑逰髙興陪登陟嘉言忝獻酬觀棊知戰勝探象㑹冥捜眺聴情何限冲融惠勿休祇應齊語黙寜肯問沈浮然諾長懷季栖遑輒累丘平生感知已方寸豈悠悠真定即事奉贈韋使君二十八韻漂泊懷書客遲迴此路隅問津驚弃置投刺忽踟蹰方伯恩彌重蒼生詠已蘇郡稱亷叔度朝議管夷吾乃繼三台側仍将四岳俱江山澄氣象崖谷倚氷壺詔寵金門策官榮葉縣鳬擢才登粉署飛歩躡雲衢起草徴調墨焚香即宴娱光華揚盛矣霄漢在兹乎隠軫推公望逶迤協帝俞軒車辭魏闕旌節副幽都始佩仙郎印俄兼太守符尤多蜀郡理更得潁川謨城邑推雄鎮山川列簡圖舊燕當絶漠全趙對平蕪曠野何彌漫長亭復鬱紆始泉遺俗近活水戰場無月換思鄉陌星迴記斗樞歲容歸萬象和氣發鴻鑪淪落而誰遇栖遑有是夫不才羞擁腫干禄謝侏儒契闊慙行邁覊離憶友于田園同季子儲蓄異陶朱方欲呈髙義吹噓揖大巫永懷吐肝膽猶憚阻榮枯解榻情何限忘言道未殊從来貴縫掖應是念窮途人日寄杜二拾遺人日題詩寄草堂遙憐故人思故郷栁條弄色不忍見梅花滿枝空斷腸身在南蕃無所預心懐百憂復千慮今年人日空相憶明年人日知何處一卧東山三十春豈知書劔老風塵龍鍾還忝二千石愧爾東西南北人贈杜二拾遺傳道招提客詩書自討論佛香時入院僧飲屢過門聴法還應難尋經剩欲飜草𤣥今已畢此後更何言酬龎十兵曹憶昔遊京華自言生羽翼懷書訪知已末路空相識許國不成名還家有慙色託身從畎畝浪迹初自得雨澤感天時耕耘忘帝力同人洛陽至問我睢水北遂爾􅅃津涯淨然見胷臆髙談懸物象逸韻投翰墨别岸逈無垠海鶴鳴不息梁城多古意攜手共悽惻懷賢想鄒枚登髙思荆棘世情惡疵賤之子憐孤直酬贈感并深離憂豈終極和崔二少府登楚丘城作故人亦不遇異縣乆棲託辛勤失路意感歎登樓作清晨眺原野獨立窮寥廓雲散芒碭山水還睢陽郭遶梁即􅁭帯封衛多漂泊事古悲城池年豐愛墟落相逢俱未展攜手空蕭索何意千里心仍求百金諾公侯皆我輩動用在謀略聖心思賢材朅来刈葵藿高常侍集巻八
