body:
  text: 高常侍集巻三唐高適撰詩同觀陳十六史興碑并序楚人陳章甫繼毛詩而作史興碑逺自周末迨乎隋季善惡不隠蓋國風之流未蔵名山刋在樂石僕美其事而賦是詩焉荆衡氣偏秀江漢流不歇此地多精靈有時生才傑伊人今獨歩逸思能間發永懐掩風騷十載常矻矻新碑亦崔嵬嘉句懸日月則是刋石經終然繼檮杌我来觀雅製慷慨變毛髪季主盡荒淫前王徒貽厥東周既削弱兩漢更淪没西晉何披猖五胡相唐突作歌乃彰善比物仍惡訐感歎将謂誰對之空咄咄留别鄭三韋九兼洛下諸公七言憶昨相逢論乆要顧君哂我輕常調羈旅雖同白社游詩書已作青雲料蹇躓一作步蹉跎竟不成年過四十尚躬耕長歌達者杯中物大一作冷笑前人身後名幸逢明盛多招隠髙山大澤徵求盡此時亦一作也得辭漁樵青袍裹身荷聖朝犂牛釣竿不復見縣人邑吏来相邀逺路鳴蟬秋興發華堂美酒離憂銷不知何時更攜手應念兹辰去折腰封丘縣我本漁樵孟諸野一生自是悠悠者乍可狂歌草澤中寜堪作吏風塵下秪言小邑無所為公門百事皆有期拜迎官長心欲碎鞭撻黎庶令人悲歸来向家問妻子舉家盡笑今如此生事應須南畝田世情付與東流水夢想舊山安在哉為銜君命日遲迴乃知梅福徒為爾轉憶陶濳歸去来宋中遇劉書記有别何代無秀士髙門生此才森然覩毛髪若見江山来㡬載困常調一朝時運催白身謁明主待詔登雲臺相逢梁宋間與我醉蒿莱寒楚眇千里雪天晝不開末路終别離不能强悲哀男兒爭富貴勸爾莫遲迴漣上題樊氏水亭漣上非所趣偶為世務牽經時駐歸棹日夕對平川莫論行子愁且得主人賢亭上酒初熟厨中魚每鮮自說宦遊来因之居住偏煑塩滄海曲種稲長淮邊四時長晏如百口無饑年菱芋藩籬下漁樵耳目前異縣少朋從我行復迍邅向不逢此君孤舟已言旋明日又分首風濤還眇然漣上别王秀才飄颻經逺道客思滿窮秋浩蕩對長漣君行殊未休﨑嶇山海側想像無前儔何意一作豈謂照乘珠忽然欲暗投東路方蕭條楚歌復悲愁暮㠶使人感去鳥兼離憂行矣當自愛壮年莫悠悠余亦從此辭異鄉難乆留贈言豈終極慎勿滯滄洲觀李九少府翥樹宓子賤神祠碑吾友吏兹邑亦嘗懷宓公安知夢寐間忽與精靈通一見興永歎再来激深衷賔從何逶迤二十四老翁於焉建一作見層碑突兀長林東作者無媿色行人感遺風坐令髙岸盡獨對秋山空片石勿謂輕斯言固難窮龍盤色絲外鵲顧偃波中形勝駐羣目堅貞指蒼穹我非王仲宣去矣徒發䝉東平路中遇大水天災自古昔昏墊一作溺彌今秋霖霪溢川原澒洞涵田疇指塗適汶陽挂席經蘆洲永望齊魯郊白雲何悠悠傍沿鉅野澤大水縱横流蟲蛇擁獨樹䴢鹿奔行舟稼穡隨波瀾西成不可求室居相枕藉鼃黽聲啾啾仍憐穴蟻漂益羡雲禽游農夫無倚着野老生殷憂聖主當深仁廟堂運良籌倉廩終爾給田租應罷收我心胡鬱陶征旅亦悲愁縱懐一作横濟時策誰肯論吾謀東平留贈狄司馬古人無宿諾兹道未一作以為難萬里赴知已一言誠可歎馬蹄經月窟劍術指樓蘭地出北庭盡城臨西海寒森然瞻武庫則是弄儒翰入幕綰銀綬乘軺兼鐡冠練兵日精銳殺敵無遺殘獻捷見天子論功俘可汗激昻丹墀下顧眄青雲端誰謂縱横策翻為權勢干将軍既坎壈使者亦辛酸耿介挹三事覊離從一官知君不得意他日㑹鵬摶遇沖和先生沖和生何代或謂游東溟三命謁金殿一言拜銀青自云多方術徃徃通神靈萬乘親問道六宫無敢聼昔去限霄漢今来覩儀形頭戴鶡鳥冠手揺白鶴翎終日飲醇酒不醉復不醒猶憶雞鳴山每誦西昇經拊背念離別依然出户庭莫見今如此曾為一客星題李別駕壁去鄉不逺逢知已握手相歡得如此禮樂遥一作猶傳魯伯禽賔客爭過魏公子酒筵莫散明月上􅇫馬長鳴春風起一生稱意􅀎㡬人今日從君問終始送前衛縣李寀少府黄鳥翩翩楊栁垂春風送客使人悲怨別自驚千里外論交却憶十年時雲開汶水孤㠶逺路繞梁山疋馬遲此地從来可乘興留君不住益悽其除夜作旅館寒燈獨不眠客心何事轉悽然故鄉今夜思千里愁鬢眀朝更一年初至封丘作可憐薄暮宦游子獨卧虚齋思無已去家百里不得歸到官數日秋風起邯鄲少年行邯鄲城南遊俠子自矜生長邯鄲裏千塲縱博家仍富㡬處報讐身不死宅中歌笑日紛紛門外車馬如雲屯未知肝膽向誰是令人却憶平原君君不見今人交態薄黄金用盡還踈索以兹感歎辭舊游更於時事無所求且與少年飲美酒往来射獵西山頭古大梁行古城莽蒼饒荆榛驅馬荒城愁殺人魏王宫觀盡禾黍信陵賔客隨灰塵憶昨雄都舊朝市軒車照耀歌鍾起軍容帶甲三十萬國歩連營一千里全盛須臾那可論高臺曲池無復存遺墟但見狐狸跡古地空餘草木根暮天揺落傷懐抱撫劍悲歌對秋草俠客猶傳朱亥名行人尚識夷門道白璧黄金萬户侯寳刀駿馬填山丘年代淒凉不可問往来惟見水東流自淇渉黄河途中十二首川上常極目世情今已閑去㠶帶落日征路隨長山親友若雲霄可望不可攀於兹任所惬浩蕩風波間亂流自兹逺倚檝時一望遥見楚漢城崔嵬高山上天道昔未測人心無所向屠釣稱侯王龍蛇爭霸王緬懐多殺戮顧此增慘愴聖代休甲兵吾其得閑放清晨汎中流羽族滿汀渚黄鵠何處来昻蔵寡儔侣飛鳴無人見飲啄豈得所雲漢爾固知胡為不輕舉野人頭盡白與我忽相訪手持青竹竿日暮淇水上雖老美容色雖貧亦閑放釣魚三十年中心無所向秋日登滑臺臺高秋已暮獨行既未惬懐土悵無趣晉宋何蕭條羌胡散馳騖當時無戰略此地即邊戍兵革徒自勤山河孰云固乘閑喜臨眺感物傷遊寓惆悵落日前飄颻逺㠶處北風吹萬里南鴈不知數歸意方浩然雲沙更廻互南登滑臺上却望河淇間行樹夾流水孤城對逺山念兹川路濶羡爾沙鷗閑長想别離處猶一作獨無音信還兹川方悠邈雲沙無前後古堰對河壖長林出淇口獨行非吾意東向日已乆憂来誰得知且酌罇中酒東入黄河水茫茫汎紆直北望太行山峨峨半天色山河相映帶深淺未可測自昔有賢才相逢不相識朝從北岸来泊船南河滸試共野人言深覺農夫苦去秋雖薄熟今夏猶未雨耕耘日勤勞租稅兼舃鹵園蔬空寥落産業不足數尚有獻芹心無因見明主茫茫濁河注懐古臨河濵禹功本豁達漢跡方因循坎德昔滂沲馮夷胡不仁渤潏陵隄防東郡多悲辛天子忽警悼從官皆負薪畚築豈無謀祈禱如有神宣房今安在髙岸空嶙峋我行倦風湍輟棹将問津空傳歌瓠子感慨獨愁人孟夏桑葉肥穠隂夾長津蠶農有時節田野無閒人臨水狎漁樵望山懐隠淪誰能去京洛顦顇對風塵朝景入平川川長復垂栁遥看魏公墓突兀前山後憶昔大業時羣雄角奔走伊人何電邁獨立風塵首傳檄舉敖倉擁兵屯洛口連營一百萬六合如可有方項終比肩亂隋將假手力爭固難恃驕戰曷能乆若使學蕭曺功名當不朽别楊山人不到嵩陽動十年舊時心事已徒然一二故人不復見三十六峯猶眼前夷門二月栁條色流鶯數聲淚沾臆鑿井耕田不我招知君以此忘帝力山人好去嵩陽路唯余眷眷長相憶高常侍集巻三
