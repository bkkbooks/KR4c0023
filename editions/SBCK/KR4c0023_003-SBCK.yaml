body:
  text: 同觀陳十六史興碑并序楚人陳章甫繼毛詩而作史興碑逺自周末迨乎隋季善惡不隱盖􅀦風之流未藏名山刋在樂石僕美其事而賦是詩焉荆衡氣偏秀江漢流不歇此地多精靈有時生才傑伊人今獨歩逸思能間發永懷掩風騷千載常矻矻新碑亦崔嵬佳句懸日月則是刋石經終然繼檮杌我來觀雅製慷慨變毛髪季主盡荒淫前王徒貽厥東周旣削弱兩漢更淪没西􅀳何披猖五胡相唐突作歌乃彰善比物仍惡訐感歎將謂誰對之空咄咄宋中遇劉書記有别何代無秀士髙門生此才森然覩毛髪􅀂見江山來㡬載困常調一朝時運催白身謁明主待詔登雲䑓相逢梁宋間與我醉蒿萊寒楚􅄅千里雪天晝不開末路終别離不能強悲哀男兒争冨貴勸爾莫遲廻漣上題樊氏水亭漣上非所趨偶爲世務牽經時駐歸棹日夕對平川莫論行子愁且得主人賢亭上酒初熟厨中魚每鮮自􅀃宦㳺來因之居住偏煑塩滄海曲種稻長淮􅁁四時長晏如百口無飢年菱芋藩籬下漁樵耳目前異縣少朋從我行復迍邅向不逢此君􅀌舟巳言旋明日又分手風濤還眇然漣上别王秀才飄颻經逺道客思滿窮秋浩蕩對長漣君行殊未休﨑嶇山海側想像無前儔何意照乗珠忽然欲暗投東路方蕭條楚歌復悲愁暮帆使人感去鳥兼離憂行矣當自愛壯年莫悠悠余亦從此辭異郷難乆􅅏贈言豈終極慎勿滯滄洲觀李九少府翥樹宓子賤神祠碑吾友吏茲邑亦嘗懷宓公安知夢寐間忽與精靈通一見興永嘆再來激深􅂨賔從何逶迤二十四老翁於焉建層碑突兀長林東作者無愧色行人感遺風坐令高岸盡獨對秋山空片石勿謂輕斯言固難窮龍盤色絲外鵲顧偃波中形勝駐群目堅貞指蒼穹我非王仲宣去矣徒發􅀩東平路中遇大水天灾自古有昏墊彌今秋霖􅍂溢川原澒洞涵田疇指塗適汶陽掛席經蘆洲永望齊魯郊白雲何悠悠傍沿鉅野澤大水緩橫流虫蛇擁獨􅀣麋鹿奔行舟稼穡隨波瀾西成不可求室居相枕籍蛙黽聲啾啾乃憐穴蟻漂益羡雲禽㳺農夫無倚着野老生殷憂聖主當深仁廟堂運良籌倉􅅒終爾給田租應罷􅀵我心胡鬰陶征旅亦悲愁縱懷濟時策誰肯論吾謀東平留贈狄司馬古人無􅀫諾兹道未爲難萬里赴知己一言誠可歎馬蹄經月窟劍術指樓蘭地出北庭盡城臨西海寒森然瞻武庫則是弄儒翰入幕綰銀綬乗軺兼鐡冠練兵日精銳殺敵無遺殘獻捷見天子論功俘可汗激昻丹墀下顧盻青雲端誰爲縱橫策翻爲權勢干將軍旣坎􅇄使者亦辛酸耿介挹三事羇離從一官知君不得意他日㑹鵬搏遇冲和先王冲和生何代或謂逰東溟三命謁金殿一言拜銀青自云多方術徃徃通神靈萬乗親問道六宫無敢􅃪昔云限霄漢今來覩儀形頭戴鶡鳥冠手摇白鶴翎終日飲醇酒不醉復不醒猶憶鷄鳴山毎誦西昇經拊背念離别依然出戶庭莫見今如此曽爲一客星自淇渉黃河途中作十二首川上常極目世情今巳閒去㠶帯落日征路隨長山親友􅀂雲霄可望不可攀於兹任所愜浩蕩風波間清晨泛中流羽族滿江渚黄鵠何處來昻藏寡儔侣飛鳴無人見飲啄豈得所雲漢爾固知胡爲不輕舉野人頭盡白與我忽相訪手持青竹竿日暮淇水上雖老羙容色雖貧亦閑放釣魚三十年中心無所向南登滑臺上􅁍望河淇間行樹夾流水􅀌城對逺山念兹川路闊羡爾沙鷗閑長想别離處猶無音信還東入黄河水茫茫汎紆直北望太行山峨峨半天色山河相映帯深淺未可測自昔有賢才相逢不相識秋日豋滑臺䑓高秋已暮獨行旣未愜懷土悵無趣晉宋何蕭條羗胡散馳騖當時無戰略此地即邊戍兵革徒自勤山河孰云固乗閒喜臨眺感物傷逰寓惆悵落日前飄颻逺㠶處北風吹萬里南鴈不知數歸意方浩然雲沙更廻互亂流自茲逺倚檝時一望遥見楚漢城崔嵬高山上天道昔未測人心無所向屠釣稱侯王龍蛇爭覇王􅃡懷多殺戮顧此増慘愴聖代休甲兵吾其得閑放兹川方悠邈雲沙無前後古堰對河壖長林出淇口獨行非吾意東向日已乆憂來誰得知且酌罇中酒朝從北岸来泊船南河滸試共野人言深覺農夫苦去秋雖薄熟今夏猶未雨耕耘日勤勞租稅兼舄鹵園􅂼空寥落産業不足數尚有獻芹心無因見明主茫茫濁河注懷古臨河濱禹功本豁逹漢跡方因循坎德昔滂沱馮夷胡不仁渤潏陵隄防東郡多悲辛天子忽驚悼從官皆負薪畚築豈無謀祈禱如有神宣房今安在髙岸空嶙峋我行倦風湍輟棹將問津空傳歌􅉚子感􅁣獨愁人孟夏桑葉肥穠隂夾長津􅁞農有時節田野無閑人臨水狎漁樵望山懷􅀮淪誰能去亰洛顦顇對風塵朝景入平川川長復垂柳遥看魏公墓突兀前山後憶昔大業時群雄角奔走伊人何電邁獨立風塵首傳檄舉敖倉擁兵屯洛口連營一百萬六合如可有方項終比肩亂隋將假手力争固難恃驕戰曷能乆􅀂使學蕭曹功名當不朽奉和儲光羲天靜終南高俯映江水明有􅀂蓬莱下淺深見澄瀛群峯懸中流石壁如瑶瓊魚龍隱蒼翠鳥獸㳺清泠菰蒲林下秋薜荔波中輕山蔓浴蘭沚水若居雲屏嵐氣浮濳宫􅀌光隨曜靈隂隂豫章館宛宛百花亭大君及群臣燕樂方嚶鳴吾黨二三子兹辰怡性情逍遥滄洲時乃在長安城塞下曲結束浮雲駿翩翩出從戎且慿王子怒復􅀝將軍雄萬皷雷殷地干旗火生風日輪駐霜戈月魄絲琱弓青海陣雲匝黒山兵氣衝戰酣太白高戰罷旄頭空萬里不惜死一朝得成功畫圖麒麟閣入朝明光宫大􅀏向文士一經何足窮古人昧此道徃徃成老翁高常侍集卷第二高常侍集卷第三五言古
