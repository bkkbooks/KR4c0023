front:
  text: 出門望終古獨立悲且歌憶昔魯仲尼悽悽此經過衆人不可向伐樹將如何逍遥漆園吏􅁳􅃿不知年世事浮雲外閑居大道􅁁古來同一馬今我亦忘筌五覇逓征伐宋人無戰功解圍幸竒􅀃易子傷吾􅂨唯見盧門外蕭條多轉蓬常愛宓子賤鳴琴能自親邑中靜無事豈不由其身何意千年後寂寥無此人閼伯去巳乆高丘臨道傍人皆有兄弟爾獨爲參商終古猶如此而人安可量
  hash: sha256:597d1e7ecaa14bbf445cc9f3fe824c8a8e54a957ae4e266dae807748c8176015
  markers:
  - {type: page-break, offset: 60, content: '', id: KR4c0023_SBCK_001-7a}
body:
  text: 薊中作策馬自沙漠長驅豋塞垣􅁁城何蕭條白日黄雲昬一到征戰處每愁胡虜翻豈無安邊書諸將已承恩惆悵孫呉事歸來獨閉門睢陽酬别暢大判官吾友遇知已策名逢聖朝高才擅白雪逸翰懷青霄承詔􅃟嘉兵􅁣然即馳軺清晝下公館尺書忽相邀􅅏歡惜别離畢景駐行鑣言及沙漠事益令胡馬驕丈夫拔東蕃聲冠霍嫖姚兠鍪衝矢石鐡甲生風飈諸將出井陘連營濟石橋酋豪盡俘馘子弟輸征徭􅁁庭絶刁斗戰地成漁樵榆􅀜夜不扄塞口長蕭蕭降胡滿薊門一一能射鵰軍中多燕樂馬上何䡖趫戎狄本無厭羈縻非一朝飢附誠足用飽飛安可招李牧制儋藍遺風豈寂寥君還謝幕府慎勿輕蒭蕘答侯少府常日好讀書晚年學垂綸漆園多喬木睢水清􅉿􅉿詔書下柴門天命敢逡廵赫赫三伏時十日到咸秦褐衣不得見黃綬翻在身吏道頓羈束生涯難重陳北使經大寒􅀜山饒苦􅉝􅁁兵若芻狗戰骨成埃塵行矣勿復言歸歟傷我神如何燕趙陲忽遇平生親開館納征􅀐彈絃娯逺賓飄颻天地間一别方茲晨東道有佳作南朝無此人性靈出萬象風骨超常倫吾黨謝王粲群賢推郄詵明時取秀才落日過蒲津節苦名已冨禄微家轉貧相逢愧薄逰撫已荷陶鈞心事正堪盡離憂寧太頻兩河歸路遥二月芳草新柳接滹沱暗鸎連渤海春誰謂行路難猥當希代珍提握毎終日相思猶比隣江海有扁舟丘園有角巾君意定何適我懷知所遵浮沉各異宜老大貴全真莫作雲霄計栖遑隨搢紳哭單父梁九少府開篋淚沾臆見君前日書夜䑓今􅄫寞猶是子雲居疇昔貪靈竒登臨賦山水同舟南浦下望月西江裏契闊多别離綢繆到生死九原即何處萬事皆如此晉山徒嵯峨斯人已􅄀􅁳常時禄且薄殁後家復貧妻子在逺道弟兄無一人十上多苦辛一官常自哂青雲將可致白日忽先盡唯有身後名空􅅏無逺近宋中遇陳二常忝鮑叔義所寄王佐才如何守苦節獨此無良媒離别十年外飄蓬千里來安知罷官後惟見柴門開窮巷隱東郭髙堂詠南陔籬根長花草井上生莓苔伊昔望霄漢于今倦蒿莱男兒命未逹且進手中杯别王徹歸客自南楚悵然思北林蕭條秋風暮􅅆首江淮深留連愁作歡或爲梁甫吟時軰想鵬舉他人嗟陸沉載酒豋平臺贈君千里心浮雲暗長路落日有歸禽離别未足悲辛勤當自任吾知十年後季子多黃金送蕭十八常苦古人逺今見斯人古淡泊遺聲華周旋必鄒魯故交在梁宋逰方出庭戸疋馬鳴朔風一身濟河滸辛勤採蘭詠欵曲翰林主􅀊月催别離庭闈逺風土寥寥寒煙靜莾莾夕雲吐明發不在兹青天眇難覩宋中送族姪式顔時張大夫貶括州使人召式顔遂有此作大夫擊東胡胡塵不敢起胡人山下哭胡馬海􅁁死部曲盡公侯輿臺亦朱紫當時有勲業末路遭䜛毀轉斾燕趙間剖符括蒼裏弟兄莫相見親族逺枌梓不改青雲心仍招布衣士平生懷感激本欲候知巳去矣難重陳飄然自兹始逰梁且未遇適越今可以鄕山西北愁竹箭東南美峥嶸縉雲外蒼莾㡬千里旅鴈悲啾啾朝昏孰云巳登臨多瘴癘動息在風水雖有賢主人終爲客行子我携一尊酒滿酌聊勸爾勸爾惟一言家聲勿淪滓又送族姪式顔惜君才未遇愛君才􅀂此世上五百年吾家一千里俱逰帝城下忽在梁園􅂻我今行山東離憂不能巳
