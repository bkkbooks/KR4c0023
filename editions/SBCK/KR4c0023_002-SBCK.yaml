body:
  text: 同吕判官從哥舒大夫破洪濟城廻登積石軍多福七級浮圖塞口連濁河轅門對山寺寧知鞍馬上獨有登臨事七級凌太清千崖列蒼翠飄飄方寓目想像見深意高興殊未平臨風颯然至㧞城陣雲合轉斾胡星墜大將何英靈官軍動天地君懷生羽翼本欲厚騏驥欵叚苦不前青􅄀信難致一歌陽春後三嘆終自愧登壠壠頭逺行客壠上分流水流水無盡期行人未云巳淺才登一命􅀌劒通萬里豈不思故鄉從來感知巳高常侍集卷第一髙常侍集卷第二五言古詩宴韋司戸山亭院人幽想靈山意愜憐逺水習靜務爲適所居還復爾汲流漲華池􅄏酌宴君子苔徑試窺踐石屏可攀􅀝入門見中峯携手如萬里橫琴了無事垂釣應有以高館何沉沉颯然涼風起贈別王七十管記故交吾未測薄宦空年􅀊晚節蹤曩賢雄詞冠當世堂中皆食客門外多酒債産業曽未言衣裘與人敝飄颻戎幕下出入􅀜山際轉戰輕壯心立談有􅁁計雲沙自廻合天海空迢逓星高漢將驕月盛胡兵銳沙深冷陘斷雪暗遼陽閉亦謂掃欃槍旋驚䧟蜂蠆歸旌告東捷闘􅀐傳西敗遥飛絶漠書已築長安第畫龍俱在葉寵鶴先歸衞勿辭部曲勲不籍將軍勢相逢季冬月悵望窮海裔折劒􅅏贈人嚴裝遂云邁我行即悠􅒺及此還羇滯曽非濟代謀且有臨深誡隨波混清濁與物同醜麗眇憶青巖棲寧忘褐衣拜自言偕氷石本欲親蘭蕙何意薄松筠翻然重管蒯恒深取與分孰慢平生契欵曲鷄􅁰期酸辛别離􅃑逢時媿名節遇坎悲渝替適趙非解紛逰燕獨無􅀃浩歌方振蕩逸翮思凌勵倐若異鵬􅅮吾當學蟬蛻效古贈崔二十月河洲時一看有歸思風飈生慘烈雨雪暗天地我軰今胡爲浩哉迷所至􅃡懷當途者濟濟居聲位邈然在雲霄寧肯更淪躓周旋多燕樂門館列車騎美人芙蓉姿狹室蘭麝氣金爐陳獸炭談􅀏正得意豈論草澤中有此枯槁士我慙經濟策久欲甘棄置君負縱橫才如何尚顦顇長歌増鬰怏對酒不能醉窮逹自有時夫子莫下涙鉅鹿贈李少府李侯雖薄宦時譽何籍籍駿馬常借人黃金毎􅅏客投壷華館靜縱酒凉風夕即此遇神仙吾忻知損益酬司空璲飄颻未得意感激與誰論昨日遇夫子乃欣吾道存江山滿詞賦扎翰起涼温吾見風雅作人知德業尊驚飈蕩萬木秋氣屯高原燕趙何蒼茫鴻鴈來翩翻此時與君别握手欲無言酬李少府出塞魂猶驚懷質意難􅀃誰知吾道間乃在客中别日夕捧瓊瑶相思無休歇伊人雖薄宦舉代推高節述作凌江山聲華滿氷雪一登薊丘上四顧何慘烈來鴈無盡時􅁁風正騷屑將從崖谷遁且與沉浮絶君若登青雲吾當投魏闕酬裴秀才男兒貴得意何必相知早飄蕩與物永蹉跎覺年老長卿無産業季子慙妻嫂此事難重陳未爲衆人道酬陸少府朝臨淇水岸還望衛人邑别意在山阿征途背原隰稍稍前村口唯見轉蓬入水渚人去遲霜天鴈飛急固應不逺别所與路未及欲濟川上舟相思空佇立寄孟五秋風落窮巷離憂兼暮蟬後時巳如此高興亦徒然知君念淹泊憶我屢周旋征路見來鴈歸人悲逺天平生感千里相望在貞賢
