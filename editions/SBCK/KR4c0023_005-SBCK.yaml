canonical_identifier: bkk:krp/KR4c0023/SBCK/v1/juan/5
seq: 5
front:
  text: 秦中送李九赴􅚼擕手望千里于今將十年如何每離別心事復迍邅適越雖有以出􅀜終耿然愁臨不可向長路或難前呉會獨行客山隂秋夜船謝家徴故事禹穴訪遺編鏡水君所憶􅐜􅅅余舊便歸來莫忘此兼示濟江篇
  hash: sha256:82ca26bb42ba739f4c0232705b18c6309676faf38dab4b7f696eb9f63ffdcacf
body:
  text: 古樂府飛龍曲􅅏上陳左相德以精靈降時膺夢寐求蒼生謝安石天子冨平侯尊爼資髙論巖廊挹大猷相門連戸牖卿族嗣弓裘豁逹雲開霽清明月映秋能爲吉甫頌善用子房籌階砌思攀陟門䦨尚阻修高山不易仰大匠本難投跡與松喬合心縁啓沃留公才山吏部書癖杜荆州幸沐千年聖何辭一尉休折腰知寵辱􅅆首見沉浮天地莊生馬江湖范蠡舟逍遥堪自樂浩蕩信無憂去此從黃綬歸歟任白頭風塵與霄漢瞻望日悠悠􅅏上李右相風俗登淳古君臣挹大庭深沉謀九德密勿契千齡獨立調元氣清心豁窅􅁳本枝連帝系長䇿冠生靈傅􅀃明殷道蕭何律漢刑鈞衡持國柄柱石緫賢經隱軫江山藻氛氲鼎鼐銘興中皆白雪身外即丹青江海呼窮鳥詩書問聚螢吹嘘成羽翼提握動芳馨􅀝伏悲還笑棲遲醉復醒恩榮初就列含育忝宵形有􅀼丘山惠無時枕席寍壯心瞻落景生事感流萍莫以才難用終期善易􅃪未爲門下客徒謝少微星辟陽城荒城在高岸凌眺俯清淇傳道漢天子而封審食其奸滛且不戮茅土孰云冝何得英雄主返令兒女欺母儀良巳失臣節豈如斯太息一朝事乃令人所嗤
  hash: sha256:c71944a88ae5551bdcfacce63070b7b682b5937f9261a698af842c0e4aa06b26
